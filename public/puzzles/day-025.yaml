day: 25
title: Rotate an Array
difficulty: medium
prompt: |
  Implement `rotate(arr, k)` so it rotates the array `k` places to the right,
  wrapping elements around. `k` can be larger than the array length.

  For example, `rotate([1, 2, 3, 4, 5], 2)` returns `[4, 5, 1, 2, 3]`.
functionName: rotate
starterCode: |
  function rotate(arr, k) {
    // your code here
  }
tests:
  - name: Case 1
    args:
      - - 1
        - 2
        - 3
        - 4
        - 5
      - 2
    expected:
      - 4
      - 5
      - 1
      - 2
      - 3
  - name: Case 2
    args:
      - - 1
        - 2
        - 3
      - 0
    expected:
      - 1
      - 2
      - 3
  - name: Case 3
    args:
      - - 1
        - 2
        - 3
      - 4
    expected:
      - 3
      - 1
      - 2
solution: |
  function rotate(arr, k) {
    const n = arr.length;
    if (n === 0) return [];
    const s = ((k % n) + n) % n;
    return arr.slice(n - s).concat(arr.slice(0, n - s));
  }

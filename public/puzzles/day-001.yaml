day: 1
title: "Reverse a String"
difficulty: easy
prompt: |
  Implement `reverseString(str)` so it returns the input string with its
  characters in reverse order.

  For example, `reverseString("hello")` returns `"olleh"`.
functionName: reverseString
starterCode: |
  function reverseString(str) {
    // your code here
  }
tests:
  - name: "Basic word"
    args: ["hello"]
    expected: "olleh"
  - name: "Empty string"
    args: [""]
    expected: ""
  - name: "Sentence with spaces"
    args: ["the quick brown fox"]
    expected: "xof nworb kciuq eht"
solution: |
  function reverseString(str) {
    return str.split('').reverse().join('');
  }
solutionExplanation: |
  Strings have no `.reverse()`, but arrays do. `split('')` turns the string into an array of single characters, `reverse()` flips that array, and `join('')` glues it back into a string.

  ⚠️ This splits by UTF-16 code unit, so emoji and other astral characters can break apart — fine for plain text.

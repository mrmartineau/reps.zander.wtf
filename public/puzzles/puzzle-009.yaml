id: 9
title: "Longest Word"
difficulty: easy
prompt: |
  Implement `longestWord(sentence)` so it returns the longest word in the
  sentence. Words are separated by spaces. If several share the longest
  length, return the first one. Punctuation counts as part of the word.

  For example, `longestWord("the quick brown fox")` returns `"quick"`. When
  there's a tie, `longestWord("cat dog pig")` returns `"cat"` — the first one.
functionName: longestWord
starterCode: |
  function longestWord(sentence) {
    // your code here
  }
tests:
  - name: "Clear winner"
    args: ["the quick brown fox"]
    expected: "quick"
  - name: "Tie returns first"
    args: ["cat dog pig"]
    expected: "cat"
  - name: "Single word"
    args: ["hello"]
    expected: "hello"
solution: |
  function longestWord(sentence) {
    let longest = '';
    for (const word of sentence.split(' ')) {
      // Only replace on a strictly longer word, so ties keep the first one.
      if (word.length > longest.length) {
        longest = word;
      }
    }
    return longest;
  }
solutionExplanation: |
  Split on spaces and keep the longest word seen so far. The important detail is `>` (strictly greater), not `>=` — so on a tie the first of the equal-length words stays the winner.

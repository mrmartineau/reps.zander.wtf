id: 33
title: Total the Revenue
difficulty: easy
prompt: |
  Implement `totalRevenue(orders)` to return the sum of every order's `price`
  as a single number.

  `reduce` collapses a list into one value — start the running total at `0`.
functionName: totalRevenue
starterCode: |
  function totalRevenue(orders) {
    // your code here
  }
tests:
  - name: Case 1
    args:
      - - id: 1
          customer: Ada
          product: Keyboard
          category: tech
          price: 80
          status: shipped
        - id: 2
          customer: Bram
          product: Mug
          category: home
          price: 12
          status: pending
        - id: 3
          customer: Ada
          product: Monitor
          category: tech
          price: 240
          status: shipped
        - id: 4
          customer: Cleo
          product: Notebook
          category: office
          price: 6
          status: cancelled
    expected: 338
  - name: Case 2
    args:
      - - id: 10
          customer: Dee
          product: Lamp
          category: home
          price: 45
          status: shipped
        - id: 11
          customer: Eve
          product: Pen
          category: office
          price: 3
          status: pending
        - id: 12
          customer: Dee
          product: Chair
          category: home
          price: 90
          status: cancelled
    expected: 138
  - name: Case 3
    args:
      - - id: 20
          customer: Fin
          product: Cable
          category: tech
          price: 9
          status: shipped
        - id: 21
          customer: Fin
          product: Desk
          category: home
          price: 150
          status: shipped
    expected: 159
solution: |
  function totalRevenue(orders) {
    return orders.reduce((total, order) => total + order.price, 0);
  }
solutionExplanation: |
  `reduce` collapses the list down to one value. Seed the running total at `0` and add each `order.price`.

id: 44
title: "Truncate a String"
difficulty: easy
prompt: |
  Implement `truncate(str, maxLen)` so it shortens a string to fit within a
  character limit. If `str` is already `maxLen` characters or fewer, return it
  unchanged. Otherwise, cut it down and append `"..."` so the result is
  **exactly** `maxLen` characters long — the three dots count toward the limit.

  For example, `truncate("JavaScript is fun", 10)` returns `"JavaScr..."`
  (7 characters of the original plus 3 dots = 10).
functionName: truncate
starterCode: |
  function truncate(str, maxLen) {
    // your code here
  }
tests:
  - name: "Long string gets cut"
    args: ["JavaScript is fun", 10]
    expected: "JavaScr..."
  - name: "Different limit"
    args: ["Hello, world", 8]
    expected: "Hello..."
  - name: "Already short enough"
    args: ["hi", 10]
    expected: "hi"
solution: |
  function truncate(str, maxLen) {
    if (str.length <= maxLen) {
      return str;
    }
    return str.slice(0, maxLen - 3) + "...";
  }
solutionExplanation: |
  The core insight: the dots are part of the budget. If the final result must
  be exactly `maxLen` characters and `"..."` takes up 3 of them, you only get
  to keep `maxLen - 3` characters of the original string.

  Build it in two steps:

  1. **Check whether you need to truncate at all.** If `str.length <= maxLen`,
     the string already fits — return it as-is, with no dots.
  2. **Otherwise, slice and append.** `str.slice(0, maxLen - 3)` keeps the
     first `maxLen - 3` characters, then `+ "..."` brings the total back up to
     exactly `maxLen`.

  The classic mistake is `str.slice(0, maxLen) + "..."`, which produces a
  string that is `maxLen + 3` characters long — over the limit. Trace the
  example: `maxLen` is `10`, so we keep `10 - 3 = 7` characters
  (`"JavaScr"`) and append the dots to land on exactly 10.

  The edge case guards the other direction: a short string like `"hi"` must
  come back *untouched*. If you skip the length check and always slice-and-
  append, `"hi"` would wrongly become `"hi..."`.

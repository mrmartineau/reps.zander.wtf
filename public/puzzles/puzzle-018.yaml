id: 18
title: Greatest Common Divisor
difficulty: medium
prompt: |
  Implement `gcd(a, b)` so it returns the greatest common divisor of two
  positive integers (the largest number that divides both).

  For example, `gcd(12, 8)` returns `4`.
functionName: gcd
starterCode: |
  function gcd(a, b) {
    // your code here
  }
tests:
  - name: Case 1
    args:
      - 12
      - 8
    expected: 4
  - name: Case 2
    args:
      - 17
      - 5
    expected: 1
  - name: Case 3
    args:
      - 100
      - 40
    expected: 20
solution: |
  function gcd(a, b) {
    // Euclid's algorithm: replace (a, b) with (b, a mod b) until b is 0.
    while (b !== 0) {
      const remainder = a % b;
      a = b;
      b = remainder;
    }
    return a;
  }
solutionExplanation: |
  Euclid's algorithm: the GCD of `a` and `b` equals the GCD of `b` and `a % b`. Keep replacing the pair until the remainder hits 0; the other number is the answer. Far faster than testing every possible divisor.

id: 114
title: "Decimal to Binary"
difficulty: easy
prompt: |
  Implement `toBinary(n)` so it returns the binary representation of a
  non-negative integer `n` as a string of `0`s and `1`s.

  For example, `toBinary(13)` returns `"1101"`, because
  `13 = 8 + 4 + 0 + 1`.

  The special case: `toBinary(0)` returns `"0"`.
functionName: toBinary
starterCode: |
  function toBinary(n) {
    // your code here
  }
tests:
  - name: "Thirteen"
    args: [13]
    expected: "1101"
  - name: "A power of two"
    args: [8]
    expected: "1000"
  - name: "Zero"
    args: [0]
    expected: "0"
solution: |
  function toBinary(n) {
    if (n === 0) {
      return "0";
    }

    let bits = "";
    while (n > 0) {
      bits = (n % 2) + bits;
      n = Math.floor(n / 2);
    }
    return bits;
  }
solutionExplanation: |
  The core insight: **repeated division by 2 peels off binary digits from
  the right**. `n % 2` tells you the last bit (is the number odd or even?),
  and `Math.floor(n / 2)` shifts the remaining bits down so the next `% 2`
  reveals the next digit.

  Trace it with `13`:

  | `n`  | `n % 2` | bits so far |
  | ---- | ------- | ----------- |
  | 13   | 1       | `"1"`       |
  | 6    | 0       | `"01"`      |
  | 3    | 1       | `"101"`     |
  | 1    | 1       | `"1101"`    |

  Notice the digits come out **in reverse** — last bit first. That's why
  the solution prepends each new digit (`bits = (n % 2) + bits`) instead of
  appending; the alternative is to append and reverse the string at the
  end. Forgetting to handle this reversal is the classic bug, and the
  power-of-two test (`8 → "1000"`) catches it loudly, since `"0001"` looks
  obviously wrong.

  The `Math.floor` matters too: JavaScript's `/` does true division
  (`13 / 2` is `6.5`), so you must floor it to keep `n` an integer.

  The edge case `0`: the loop condition `n > 0` is false from the start, so
  without the guard you'd return the empty string `""`. Zero still deserves
  a digit, hence the explicit early `return "0"`.

  The shortcut worth knowing: JavaScript can do all of this in one call —
  `n.toString(2)` (and it even handles `0` correctly). Use it in real code;
  the loop above is the *why* behind it, and the same peel-digits pattern
  works for any base.

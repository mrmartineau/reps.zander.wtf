day: 34
title: Count Orders by Status
difficulty: medium
prompt: |
  Implement `countByStatus(orders)` to return an object mapping each `status`
  to how many orders have it, e.g. `{ shipped: 2, pending: 1, cancelled: 1 }`.

  A tally is a `reduce` where the accumulator is a plain object.
functionName: countByStatus
starterCode: |
  function countByStatus(orders) {
    // your code here
  }
tests:
  - name: Case 1
    args:
      - - id: 1
          customer: Ada
          product: Keyboard
          category: tech
          price: 80
          status: shipped
        - id: 2
          customer: Bram
          product: Mug
          category: home
          price: 12
          status: pending
        - id: 3
          customer: Ada
          product: Monitor
          category: tech
          price: 240
          status: shipped
        - id: 4
          customer: Cleo
          product: Notebook
          category: office
          price: 6
          status: cancelled
    expected:
      shipped: 2
      pending: 1
      cancelled: 1
  - name: Case 2
    args:
      - - id: 10
          customer: Dee
          product: Lamp
          category: home
          price: 45
          status: shipped
        - id: 11
          customer: Eve
          product: Pen
          category: office
          price: 3
          status: pending
        - id: 12
          customer: Dee
          product: Chair
          category: home
          price: 90
          status: cancelled
    expected:
      shipped: 1
      pending: 1
      cancelled: 1
  - name: Case 3
    args:
      - - id: 20
          customer: Fin
          product: Cable
          category: tech
          price: 9
          status: shipped
        - id: 21
          customer: Fin
          product: Desk
          category: home
          price: 150
          status: shipped
    expected:
      shipped: 2
solution: |
  function countByStatus(orders) {
    return orders.reduce((counts, order) => {
      counts[order.status] = (counts[order.status] ?? 0) + 1;
      return counts;
    }, {});
  }
solutionExplanation: |
  A tally is a `reduce` whose accumulator is a plain object. For each order, bump the count stored at its status key — `?? 0` handles the first time a status is seen — and return the accumulator each step.

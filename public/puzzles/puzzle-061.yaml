id: 61
title: "Repeat Each Element"
difficulty: easy
prompt: |
  Implement `repeatElements(arr, n)` so it returns a new array where each
  element of `arr` is repeated `n` times **in place** — all copies of an
  element stay together, in the original element order.

  If `n` is `0`, the result is `[]`.

  For example, `repeatElements(["a", "b"], 2)` returns
  `["a", "a", "b", "b"]` — not `["a", "b", "a", "b"]`.
functionName: repeatElements
starterCode: |
  function repeatElements(arr, n) {
    // your code here
  }
tests:
  - name: "Each element doubled"
    args: [["a", "b"], 2]
    expected: ["a", "a", "b", "b"]
  - name: "Numbers tripled"
    args: [[1, 2, 3], 3]
    expected: [1, 1, 1, 2, 2, 2, 3, 3, 3]
  - name: "Zero repeats"
    args: [["a", "b", "c"], 0]
    expected: []
solution: |
  function repeatElements(arr, n) {
    const result = [];
    for (const value of arr) {
      for (let i = 0; i < n; i += 1) {
        result.push(value);
      }
    }
    return result;
  }
solutionExplanation: |
  The core insight: "each element repeated `n` times, copies kept together"
  is a **nested loop** — the outer loop picks the element, the inner loop
  pushes it `n` times before the outer loop moves on. Which loop goes
  outside is the whole puzzle: element outside, count inside gives
  `a a b b`; swap them and you'd interleave into `a b a b`.

  Step by step:

  1. Start with an empty `result` array.
  2. Outer loop: visit each `value` of `arr` in order.
  3. Inner loop: push that same `value` exactly `n` times.
  4. Only then does the outer loop advance — which is what keeps all the
     copies of one element adjacent.

  The `n = 0` edge case is handled by the loop condition itself: the inner
  loop's `i < 0` test is false immediately, so nothing is ever pushed and
  you return `[]`. No `if (n === 0)` guard needed — `for` loops that run
  zero times are a feature, not a problem.

  You might have tried `flatMap`, and it's a lovely fit here:
  `arr.flatMap(value => Array(n).fill(value))`. Each element maps to a
  little array of `n` copies, and `flatMap` flattens those runs back into
  one array — `Array(0).fill(x)` is `[]`, so `n = 0` works there too. Both
  versions are idiomatic; the nested loop makes the "copies stay together"
  structure visible, which is why it's the one shown.

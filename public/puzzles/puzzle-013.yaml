id: 13
title: Anagram Check
difficulty: medium
prompt: |
  Implement `isAnagram(a, b)` so it returns `true` when the two strings contain
  the same letters in any order, ignoring case, spaces and punctuation.

  For example, `isAnagram("listen", "silent")` is `true`, and
  `isAnagram("hello", "world")` is `false`.
functionName: isAnagram
starterCode: |
  function isAnagram(a, b) {
    // your code here
  }
tests:
  - name: Case 1
    args:
      - listen
      - silent
    expected: true
  - name: Case 2
    args:
      - hello
      - world
    expected: false
  - name: Case 3
    args:
      - Dormitory
      - Dirty room
    expected: true
solution: |
  function isAnagram(a, b) {
    // Reduce a string to its sorted letters/digits, lowercased.
    const normalise = (s) =>
      s.toLowerCase().replace(/[^a-z0-9]/g, '').split('').sort().join('');
    return normalise(a) === normalise(b);
  }
solutionExplanation: |
  Two strings are anagrams when they contain the same letters. Reduce each to a canonical form — lowercase, strip non-alphanumerics, sort the characters — and the two forms are identical exactly when the strings are anagrams.

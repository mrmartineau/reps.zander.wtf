id: 82
title: "Detect a Pangram"
difficulty: medium
prompt: |
  Implement `isPangram(sentence)` so it returns `true` if the sentence
  contains **every letter from `a` to `z` at least once**, ignoring case.
  Spaces, digits and punctuation are ignored — only the 26 letters matter.

  For example, `isPangram("The quick brown fox jumps over the lazy dog")`
  returns `true`, because every letter of the alphabet appears somewhere in
  it.
functionName: isPangram
starterCode: |
  function isPangram(sentence) {
    // your code here
  }
tests:
  - name: "The classic pangram"
    args: ["The quick brown fox jumps over the lazy dog"]
    expected: true
  - name: "Another pangram"
    args: ["Pack my box with five dozen liquor jugs"]
    expected: true
  - name: "Almost — missing letters"
    args: ["The quick brown fox jumps over the lazy cat"]
    expected: false
solution: |
  function isPangram(sentence) {
    const lower = sentence.toLowerCase();
    const alphabet = "abcdefghijklmnopqrstuvwxyz";
    for (const letter of alphabet) {
      if (!lower.includes(letter)) {
        return false;
      }
    }
    return true;
  }
solutionExplanation: |
  The core insight: flip the question around. Don't scan the *sentence* asking
  "what letters have I collected?" — scan the **alphabet** asking "is this
  letter somewhere in the sentence?". The alphabet is a fixed, known list of
  26 items, which makes it the natural thing to loop over.

  Step by step:

  1. Lowercase the sentence once, so `"T"` satisfies the requirement for
     `"t"`. This is the whole case-insensitivity story — one call, up front.
  2. Write out the alphabet as a string and loop over its letters.
  3. For each letter, `lower.includes(letter)` answers "does it appear at
     least once?". The moment one letter is missing, return `false` — no
     point checking the rest.
  4. Survive all 26 checks and the answer is `true`.

  Notice what you *don't* have to do: filter out spaces, digits or
  punctuation. Since you only ever ask about the letters `a`–`z`, the junk
  characters are simply never consulted. Ignoring them costs zero code.

  The near-miss edge case is the heart of the puzzle: swap `dog` for `cat`
  in the classic sentence and the letters `d` and `g` vanish — so a correct
  solution must verify **all 26**, not just spot-check a few or count total
  letters. Counting 26 *distinct* letters also works
  (`new Set(lower.replace(/[^a-z]/g, "")).size === 26`), but then you must
  remember to strip non-letters first, or the set picks up spaces and
  punctuation and the count is wrong.

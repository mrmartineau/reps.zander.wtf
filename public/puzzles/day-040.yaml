day: 40
title: Summarise by Category
difficulty: hard
prompt: |
  Implement `summariseByCategory(orders)`: drop cancelled orders, group the rest
  by category, then return an array of `{ category, orderCount, revenue }` — one
  summary per category, in first-seen order. `revenue` is the sum of prices in
  that category.

  A realistic pipeline: filter the noise, bucket the rest, summarise each bucket.
functionName: summariseByCategory
starterCode: |
  function summariseByCategory(orders) {
    // your code here
  }
tests:
  - name: Case 1
    args:

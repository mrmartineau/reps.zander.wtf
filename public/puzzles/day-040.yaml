solution: |
  function summariseByCategory(orders) {
    const groups = {};
    for (const order of orders) {
      if (order.status === 'cancelled') continue;
      groups[order.category] ??= [];
      groups[order.category].push(order);
    }
    return Object.entries(groups).map(([category, group]) => ({
      category,
      orderCount: group.length,
      revenue: group.reduce((total, order) => total + order.price, 0),
    }));
  }
solutionExplanation: |
  A realistic three-step pipeline. Skip cancelled orders, bucket the rest by category (the same `??= []` grouping trick), then turn each bucket into a `{ category, orderCount, revenue }` summary — `orderCount` is the bucket length, `revenue` is a `reduce` over its prices. `Object.entries` preserves first-seen key order.

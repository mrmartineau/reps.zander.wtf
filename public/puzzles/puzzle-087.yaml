id: 87
kind: react-component
title: "Navigation Links"
difficulty: easy
prompt: |
  Build a `NavLinks` component that takes a `links` prop — an array of
  `{ label, href, external }` objects — and renders each one as an `<a>`
  inside a single `<nav>`.

  Every link gets its `href`; links marked `external: true` must *also* get
  `target="_blank"`, and the rest must not have a `target` at all.

  For example, given
  `links={[{ label: 'Home', href: '/' }, { label: 'Docs', href: 'https://docs.example.com', external: true }]}`
  it should render a nav with two anchors, where only the Docs link opens in a
  new tab.
componentName: NavLinks
starterCode: |
  function NavLinks({ links }) {
    // Return a <nav> with one <a> per link.
  }
tests:
  - name: "Renders one anchor per link"
    props:
      links:
        - { label: "Home", href: "/" }
        - { label: "About", href: "/about" }
        - { label: "Docs", href: "https://docs.example.com", external: true }
    assert: { selector: "nav a", count: 3 }
  - name: "Only external links open in a new tab"
    props:
      links:
        - { label: "Home", href: "/" }
        - { label: "About", href: "/about" }
        - { label: "Docs", href: "https://docs.example.com", external: true }
    assert: { selector: 'a[target="_blank"]', count: 1 }
  - name: "Internal-only navs have no new-tab links"
    props:
      links:
        - { label: "Home", href: "/" }
        - { label: "About", href: "/about" }
    assert: { selector: 'a[target="_blank"]', count: 0 }
solution: |
  function NavLinks({ links }) {
    return (
      <nav>
        {links.map((link) => (
          <a key={link.href} href={link.href} target={link.external ? "_blank" : undefined}>
            {link.label}
          </a>
        ))}
      </nav>
    );
  }
solutionExplanation: |
  The mapping part is the familiar list pattern: `links.map(...)` turns each
  object into an `<a>`, with `href` passed straight through and a `key` so
  React can track the siblings.

  The insight worth keeping is how to *conditionally include an attribute*.
  Passing `undefined` as a prop value — `target={link.external ? "_blank" :
  undefined}` — makes React omit the attribute entirely, which is exactly what
  the last test checks. You might have tried `target={link.external &&
  "_blank"}`, but that passes `false` for internal links; React also drops
  `false` for `target`, though `undefined` states the intent more directly and
  works for every attribute.

  The gotcha is putting `target="_blank"` on every link (it's easy to copy it
  in unconditionally): the second test would still pass for the external link,
  but the internal links would match `a[target="_blank"]` too and break both
  count checks.

day: 36
title: Group by Category
difficulty: medium
prompt: |
  Implement `groupByCategory(orders)` to return an object whose keys are
  categories and whose values are arrays of the orders in that category.

  Walk the list, dropping each order into a bucket keyed by `order.category`.
functionName: groupByCategory
starterCode: |
  function groupByCategory(orders) {
    // your code here
  }

          customer: Fin
          product: Cable
          category: tech
          price: 9
          status: shipped
        - id: 21
          customer: Fin
          product: Desk
          category: home
          price: 150
          status: shipped
    expected:
      tech:
        - id: 20
          customer: Fin
          product: Cable

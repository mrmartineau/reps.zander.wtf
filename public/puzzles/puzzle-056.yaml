id: 56
kind: react-component
title: "Cart Summary"
difficulty: medium
prompt: |
  Build a `CartSummary` component that takes an `items` prop — an array of
  `{ name, price, qty }` objects, where `price` is a whole number of dollars —
  and renders:

  - a `<ul>` with one `<li>` per item showing its name, and
  - a `<p className="total">` reading `Total: $N`, where `N` is the sum of
    `price × qty` across all items.

  An empty cart still shows the total line: `Total: $0`.

  For example, two Teas at $4 and one Mug at $9 renders two list items and
  `Total: $17`.
componentName: CartSummary
starterCode: |
  function CartSummary({ items }) {
    // Return a <ul> of items plus a <p className="total">.
  }
tests:
  - name: "Renders one row per line item"
    props:
      items:
        - { name: "Tea", price: 4, qty: 2 }
        - { name: "Mug", price: 9, qty: 1 }
        - { name: "Biscuits", price: 3, qty: 4 }
    assert: { selector: "ul li", count: 3 }
  - name: "Totals price times quantity"
    props:
      items:
        - { name: "Tea", price: 4, qty: 2 }
        - { name: "Mug", price: 9, qty: 1 }
    assert: { selector: "p.total", text: "Total: $17" }
  - name: "An empty cart totals zero"
    props: { items: [] }
    assert: { selector: "p.total", text: "Total: $0" }
solution: |
  function CartSummary({ items }) {
    const total = items.reduce((sum, item) => sum + item.price * item.qty, 0);
    return (
      <div>
        <ul>
          {items.map((item) => (
            <li key={item.name}>{item.name}</li>
          ))}
        </ul>
        <p className="total">Total: ${total}</p>
      </div>
    );
  }
solutionExplanation: |
  The component has two jobs — show the rows and show a *derived* number —
  and the shape to internalise is: derive the number first, render second.
  `reduce` is the tool for collapsing an array to one value; here each step
  adds `price * qty` (not just `price` — forgetting the quantity is the
  classic bug, and it's why two $4 Teas contribute $8 to the test's $17).

  The `0` passed as `reduce`'s second argument is doing quiet but important
  work: it's the starting accumulator, *and* it's the answer for an empty
  array. Without it, `[].reduce(...)` doesn't return 0 — it throws. That's
  exactly what the empty-cart test is probing, and the fix costs one
  character.

  Rendering-wise, note the `<div>` wrapper: a component must return a single
  element, and here there are two siblings (`<ul>` and `<p>`). A `Fragment`
  (`<>...</>` or `<Fragment>`) works just as well if you'd rather not add a
  wrapper node. The dollar sign is plain text in the JSX — `Total: ${total}`
  inside JSX is *not* a template literal, so `$` followed by `{total}` reads
  naturally and renders `Total: $17`.

day: 21
title: Array Nesting Depth
difficulty: hard
prompt: |
  Implement `maxDepth(arr)` so it returns how deeply arrays are nested. A flat
  array is depth `1`; an array containing an array is depth `2`, and so on.

  For example, `maxDepth([1, [2, [3]]])` returns `3`.
functionName: maxDepth
starterCode: |
  function maxDepth(arr) {
    // your code here
  }
tests:
  - name: Case 1
    args:
      - - 1
        - 2
        - 3
    expected: 1
  - name: Case 2
    args:
      - - 1
        - - 2
          - - 3
    expected: 3
  - name: Case 3
    args:
      - []
    expected: 1
solution: |
  function maxDepth(arr) {
    const depth = (a) => (Array.isArray(a) ? 1 + Math.max(0, ...a.map(depth)) : 0);
    return depth(arr);
  }

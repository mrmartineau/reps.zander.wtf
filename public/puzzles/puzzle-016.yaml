id: 16
title: Average
difficulty: easy
prompt: |
  Implement `average(nums)` so it returns the mean of the numbers, rounded to
  2 decimal places. Return `0` for an empty array.

  For example, `average([1, 2, 4])` returns `2.33`.
functionName: average
starterCode: |
  function average(nums) {
    // your code here
  }
tests:
  - name: Case 1
    args:
      - - 1
        - 2
        - 4
    expected: 2.33
  - name: Case 2
    args:
      - - 5
        - 5
        - 5
    expected: 5
  - name: Case 3
    args:
      - []
    expected: 0
solution: |
  function average(nums) {
    if (nums.length === 0) return 0;
    const sum = nums.reduce((a, b) => a + b, 0);
    return Math.round((sum / nums.length) * 100) / 100;
  }
solutionExplanation: |
  Sum with `reduce`, then divide by the count. Guard the empty array first — otherwise you'd divide by zero and get `NaN`. `Math.round(x * 100) / 100` rounds to 2 decimal places.

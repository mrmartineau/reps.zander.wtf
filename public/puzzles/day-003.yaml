day: 3
title: "Sum of Digits"
difficulty: easy
prompt: |
  Implement `sumDigits(n)` so it returns the sum of the digits of a
  non-negative integer `n`.

  For example, `sumDigits(1234)` returns `10`, because `1 + 2 + 3 + 4 = 10`.
functionName: sumDigits
starterCode: |
  function sumDigits(n) {
    // your code here
  }
tests:
  - name: "Multi-digit"
    args: [1234]
    expected: 10
  - name: "Single digit"
    args: [7]
    expected: 7
  - name: "Zero"
    args: [0]
    expected: 0
solution: |
  function sumDigits(n) {
    let total = 0;
    // Add up each digit of n.
    for (const digit of String(n)) {
      total += Number(digit);
    }
    return total;
  }

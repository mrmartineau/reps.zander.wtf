id: 14
title: Chunk an Array
difficulty: medium
prompt: |
  Implement `chunk(arr, size)` so it splits `arr` into sub-arrays of length
  `size` (the last chunk may be shorter).

  For example, `chunk([1, 2, 3, 4, 5], 2)` returns `[[1, 2], [3, 4], [5]]`.
functionName: chunk
starterCode: |
  function chunk(arr, size) {
    // your code here
  }
tests:
  - name: Case 1
    args:
      - - 1
        - 2
        - 3
        - 4
        - 5
      - 2
    expected:
      - - 1
        - 2
      - - 3
        - 4
      - - 5
  - name: Case 2
    args:
      - - 1
        - 2
        - 3
      - 3
    expected:
      - - 1
        - 2
        - 3
  - name: Case 3
    args:
      - []
      - 3
    expected: []
solution: |
  function chunk(arr, size) {
    const out = [];
    for (const item of arr) {
      const last = out[out.length - 1];
      if (!last || last.length === size) {
        out.push([item]);        // no chunk yet, or it's full → start a new one
      } else {
        last.push(item);         // room left → add to current chunk
      }
    }
    return out;
  }
solutionExplanation: |
  Keep a list of chunks. For each item, look at the last chunk: if there isn't one yet, or it's already full, start a new chunk; otherwise add the item to it.

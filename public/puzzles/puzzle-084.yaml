id: 84
kind: react-component
title: "Leaderboard"
difficulty: medium
prompt: |
  Build a `Leaderboard` component that takes a `players` prop — an array of
  `{ name, score }` objects in no particular order — and renders an `<ol>`
  with one `<li>` per player, sorted by score from highest to lowest.

  Each item's text must be the player's name and score separated by a colon
  and a space, e.g. `Ada: 42`.

  For example, given
  `players={[{ name: 'Sam', score: 12 }, { name: 'Ada', score: 42 }]}` it
  renders an ordered list where `Ada: 42` comes first.
componentName: Leaderboard
starterCode: |
  function Leaderboard({ players }) {
    // Return an <ol> of players, highest score first.
  }
tests:
  - name: "Renders one row per player"
    props:
      players:
        - { name: "Sam", score: 12 }
        - { name: "Ada", score: 42 }
        - { name: "Lin", score: 7 }
    assert: { selector: "ol li", count: 3 }
  - name: "Highest score comes first"
    props:
      players:
        - { name: "Sam", score: 12 }
        - { name: "Ada", score: 42 }
        - { name: "Lin", score: 7 }
    assert: { selector: "ol li:first-child", text: "Ada: 42" }
  - name: "An empty leaderboard has no rows"
    props: { players: [] }
    assert: { selector: "li", count: 0 }
solution: |
  function Leaderboard({ players }) {
    const ranked = [...players].sort((a, b) => b.score - a.score);
    return (
      <ol>
        {ranked.map((player) => (
          <li key={player.name}>
            {player.name}: {player.score}
          </li>
        ))}
      </ol>
    );
  }
solutionExplanation: |
  This is a two-step pipeline: put the data in display order, *then* map it to
  JSX. Trying to do both at once is what makes list components messy — sort
  first into a `ranked` variable and the JSX below it stays a plain `.map`.

  Descending order falls out of the comparator `(a, b) => b.score - a.score`:
  when `b` scores higher the result is positive, so `b` is placed before `a`.
  Flipping it to `a.score - b.score` is the classic mistake and gives you
  lowest-first.

  Note the spread in `[...players].sort(...)`. `sort` mutates the array it's
  called on, and props are meant to be read-only — sorting a *copy* keeps the
  component honest. (The test harness clones props defensively, so mutating
  would pass here, but in a real app sorting props in place can corrupt the
  parent's state.)

  The empty case needs no special handling: an empty array sorts and maps to
  nothing, so no `<li>` is rendered — a good reminder that the map-over-data
  pattern usually handles "no data" for free.

id: 90
kind: react-component
title: "File Tree"
difficulty: hard
prompt: |
  Build a `FileTree` component that renders a nested file explorer. It takes
  an `entries` prop: an array where each entry is `{ name }` for a file or
  `{ name, children }` for a folder, and `children` is itself an array of
  entries — nested arbitrarily deep.

  Render a `<ul>` with one `<li>` per entry showing its `name`. A folder's
  `<li>` must additionally contain a nested `<ul>` for its `children`,
  following the same rules all the way down. A file's `<li>` must not contain
  a `<ul>` at all — not even an empty one.

  For example,
  `entries={[{ name: 'src', children: [{ name: 'index.js' }] }, { name: 'README.md' }]}`
  renders a two-item list where the `src` item contains its own one-item list.
componentName: FileTree
starterCode: |
  function FileTree({ entries }) {
    // Return a <ul>; folders contain a nested <ul> of their children.
  }
tests:
  - name: "Renders every file and folder"
    props:
      entries:
        - name: "src"
          children:
            - { name: "index.js" }
            - name: "lib"
              children:
                - { name: "utils.js" }
        - { name: "README.md" }
    assert: { selector: "li", count: 5 }
  - name: "Nests children inside their parent item"
    props:
      entries:
        - name: "src"
          children:
            - { name: "index.js" }
            - name: "lib"
              children:
                - { name: "utils.js" }
        - { name: "README.md" }
    assert: { selector: "li li li", count: 1 }
  - name: "Files don't get an empty child list"
    props:
      entries:
        - { name: "a.txt" }
        - { name: "b.txt" }
    assert: { selector: "li ul", count: 0 }
solution: |
  function FileTree({ entries }) {
    return (
      <ul>
        {entries.map((entry) => (
          <li key={entry.name}>
            {entry.name}
            {entry.children && <FileTree entries={entry.children} />}
          </li>
        ))}
      </ul>
    );
  }
solutionExplanation: |
  The unlocking idea: the data is recursive, so the component should be too.
  A folder's `children` has exactly the same shape as the top-level `entries`
  — so the cleanest way to render it is for `FileTree` to render *itself*:
  `<FileTree entries={entry.children} />`. Each recursive call handles one
  level and delegates the rest; no manual depth tracking, no flattening.

  You might have tried walking the tree with nested loops or a stack and
  building one flat list — that can pass the count test but loses the
  *structure*: the `li li li` test checks that `utils.js` really sits inside
  `lib` inside `src` in the DOM, which falls out naturally from recursion and
  is painful to fake.

  The recursion's base case is what the third test guards. Files have no
  `children`, so `entry.children && <FileTree ... />` renders nothing for them
  — and because every `FileTree` call emits a `<ul>`, calling it
  unconditionally (or rendering `<ul>` before checking) would wrap every file
  in an empty list. Guarding *before* recursing is both the base case and the
  fix.

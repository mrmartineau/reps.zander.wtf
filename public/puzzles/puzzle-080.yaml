id: 80
kind: react-component
title: "Item Count Label"
difficulty: easy
prompt: |
  Build an `ItemCount` component that takes `count` and `noun` props and
  renders a `<p className="count">` with a human-friendly label:

  - `count` of `0` → `No {noun}s` (e.g. `No results`)
  - `count` of `1` → `1 {noun}` (e.g. `1 file`)
  - anything else → `{count} {noun}s` (e.g. `3 items`)

  Naive pluralisation is fine — just add an `s`; you don't need to handle
  irregular nouns.

  For example, `count={3} noun="item"` renders `<p class="count">3 items</p>`.
componentName: ItemCount
starterCode: |
  function ItemCount({ count, noun }) {
    // Return a <p className="count"> with the right label.
  }
tests:
  - name: "Pluralises a normal count"
    props: { count: 3, noun: "item" }
    assert: { selector: "p.count", text: "3 items" }
  - name: "Exactly one stays singular"
    props: { count: 1, noun: "file" }
    assert: { selector: "p.count", text: "1 file" }
  - name: "Zero reads as a sentence, not a number"
    props: { count: 0, noun: "result" }
    assert: { selector: "p.count", text: "No results" }
solution: |
  function ItemCount({ count, noun }) {
    const label =
      count === 0 ? `No ${noun}s` : count === 1 ? `1 ${noun}` : `${count} ${noun}s`;
    return <p className="count">{label}</p>;
  }
solutionExplanation: |
  The insight is to separate *computing the label* from *rendering it*. There
  are three cases, but only one piece of markup — so work the text out first
  (a chained ternary or a small `if`/`else` ladder both read fine for three
  branches) and keep the JSX to a single `<p>`.

  Doing the branching inside the JSX instead — three different `return`s, or
  nested ternaries wrapped around markup — works, but duplicates the `<p
  className="count">` shell three times, and that duplication is where typos
  hide.

  The case people miss is zero. `0` is falsy, so a shortcut like
  `{count && ...}` misbehaves, and the lazy `${count} ${noun}s` path would
  render the robotic `0 results`. The prompt wants `No results` — checking
  `count === 0` explicitly, before the general case, is the whole trick.

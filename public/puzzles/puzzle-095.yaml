id: 95
title: "Partition by Parity"
difficulty: easy
prompt: |
  Implement `partitionByParity(nums)` so it splits an array of integers into
  two arrays — the evens and the odds — returned as `[evens, odds]`. Both
  arrays keep the numbers in their original order.

  If every number has the same parity, the other array is simply empty.

  For example, `partitionByParity([1, 2, 3, 4])` returns `[[2, 4], [1, 3]]`.
functionName: partitionByParity
starterCode: |
  function partitionByParity(nums) {
    // your code here
  }
tests:
  - name: "Mixed evens and odds"
    args: [[1, 2, 3, 4]]
    expected: [[2, 4], [1, 3]]
  - name: "Order is preserved"
    args: [[7, 0, 5, 2, 9]]
    expected: [[0, 2], [7, 5, 9]]
  - name: "All odd"
    args: [[1, 3, 5]]
    expected: [[], [1, 3, 5]]
solution: |
  function partitionByParity(nums) {
    const evens = [];
    const odds = [];
    for (const n of nums) {
      if (n % 2 === 0) {
        evens.push(n);
      } else {
        odds.push(n);
      }
    }
    return [evens, odds];
  }
solutionExplanation: |
  This is the **partition** pattern: one pass over the input, two buckets,
  and every element gets dropped into exactly one of them. Because you visit
  elements in order and only ever `push`, the original order inside each
  bucket is preserved automatically — no sorting needed.

  Step by step:

  1. Create two empty arrays, `evens` and `odds`.
  2. Loop over `nums` once.
  3. Test parity with the remainder operator: `n % 2 === 0` means even.
  4. Push into the matching bucket, then return `[evens, odds]` — an array
     containing the two arrays, in that exact order.

  The edge case ("all odd") needs no special handling: the `evens` bucket
  just never gets pushed to and comes out as `[]`. The mistake it actually
  catches is returning the wrong *shape* — `[1, 3, 5]` flattened, or
  `[odds, evens]` swapped — so double-check that evens come first even when
  there are none.

  You might have tried two `filter` calls:
  `[nums.filter(n => n % 2 === 0), nums.filter(n => n % 2 !== 0)]`. That's
  perfectly fine here and very readable — it just walks the array twice.
  The single-loop version is the shape that generalises to any "split into
  groups by a condition" problem, which is why it's worth practising.

day: 15
title: Number Range
difficulty: easy
prompt: |
  Implement `range(start, end)` so it returns an array of every integer from
  `start` to `end`, inclusive.

  For example, `range(1, 5)` returns `[1, 2, 3, 4, 5]`.
functionName: range
starterCode: |
  function range(start, end) {
    // your code here
  }
tests:
  - name: Case 1
    args:
      - 1
      - 5
    expected:
      - 1
      - 2
      - 3
      - 4
      - 5
  - name: Case 2
    args:
      - 0
      - 0
    expected:
      - 0
  - name: Case 3
    args:
      - 3
      - 6
    expected:
      - 3
      - 4
      - 5
      - 6
solution: |
  function range(start, end) {
    const out = [];
    for (let i = start; i <= end; i++) out.push(i);
    return out;
  }
solutionExplanation: |
  A simple loop from `start` to `end`, pushing each integer. `<=` is what makes `end` inclusive.

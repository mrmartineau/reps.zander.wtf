id: 111
title: "Password Checklist"
difficulty: medium
prompt: |
  The signup form shows users exactly which password rules they're failing.
  Implement `validatePassword(pw)` so it checks these four rules, in this
  fixed order, and returns an array of the names of the rules that **fail**:

  1. `"length"` — at least 8 characters
  2. `"uppercase"` — contains at least one uppercase letter (`A`–`Z`)
  3. `"lowercase"` — contains at least one lowercase letter (`a`–`z`)
  4. `"digit"` — contains at least one digit (`0`–`9`)

  For example, `validatePassword("abc")` returns
  `["length", "uppercase", "digit"]` — it's too short, has no uppercase
  letter, and has no digit (but it does have lowercase letters, so that rule
  passes).

  A password that satisfies all four rules returns `[]`.
functionName: validatePassword
starterCode: |
  function validatePassword(pw) {
    // your code here
  }
tests:
  - name: "Short all-lowercase password"
    args: ["abc"]
    expected: ["length", "uppercase", "digit"]
  - name: "Long but missing a digit"
    args: ["Password"]
    expected: ["digit"]
  - name: "Valid password"
    args: ["Secret123"]
    expected: []
solution: |
  function validatePassword(pw) {
    const rules = [
      { name: "length", passes: pw.length >= 8 },
      { name: "uppercase", passes: /[A-Z]/.test(pw) },
      { name: "lowercase", passes: /[a-z]/.test(pw) },
      { name: "digit", passes: /[0-9]/.test(pw) },
    ];

    return rules.filter((rule) => !rule.passes).map((rule) => rule.name);
  }
solutionExplanation: |
  The core insight: treat the rules as **data, not branches**. Instead of
  four separate `if` statements each pushing a string, build a list of
  `{ name, passes }` pairs and then collect the names of the ones that
  failed. Because the list is written in the required order, the output
  order is guaranteed for free.

  Step by step:

  1. Evaluate each rule to a boolean:
     - `pw.length >= 8` for the length rule.
     - `/[A-Z]/.test(pw)` asks "does *any* character match this set?" —
       that's exactly what "contains at least one uppercase letter" means.
       The same shape with `[a-z]` and `[0-9]` covers the other two rules.
  2. `filter((rule) => !rule.passes)` keeps only the failures.
  3. `map((rule) => rule.name)` turns them into the rule-name strings.

  If regexes aren't in your toolkit yet, a loop works for each rule too:
  scan the characters and check `ch >= "A" && ch <= "Z"`. The regex is just
  the compact spelling of the same scan.

  The edge case is the happy customer: a password passing all four rules
  must return an **empty array**, not `null` or a "success" string — the
  caller's contract is "list of failures", and no failures means an empty
  list. With the filter approach this needs zero extra code.

  Watch out for the inversion: it's easy to accidentally return the rules
  that *pass*. The function reports what's **wrong** — hence the `!` in the
  filter.

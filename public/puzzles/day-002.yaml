day: 2
title: "FizzBuzz Array"
prompt: |
  Implement `fizzbuzz(n)` so it returns an array of length `n` (for values
  1..n). For multiples of 3 use `"Fizz"`, multiples of 5 use `"Buzz"`,
  multiples of both use `"FizzBuzz"`, otherwise the number itself (as a number).

  For example, `fizzbuzz(5)` returns `[1, 2, "Fizz", 4, "Buzz"]`.
functionName: fizzbuzz
starterCode: |
  function fizzbuzz(n) {
    // your code here
  }
tests:
  - name: "First five"
    args: [5]
    expected: [1, 2, "Fizz", 4, "Buzz"]
  - name: "Hits FizzBuzz at 15"
    args: [15]
    expected: [1, 2, "Fizz", 4, "Buzz", "Fizz", 7, 8, "Fizz", "Buzz", 11, "Fizz", 13, 14, "FizzBuzz"]
  - name: "Zero length"
    args: [0]
    expected: []
solution: |
  function fizzbuzz(n) {
    const out = [];
    for (let i = 1; i <= n; i++) {
      if (i % 15 === 0) out.push('FizzBuzz');
      else if (i % 3 === 0) out.push('Fizz');
      else if (i % 5 === 0) out.push('Buzz');
      else out.push(i);
    }
    return out;
  }

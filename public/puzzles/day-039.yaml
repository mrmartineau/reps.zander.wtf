day: 39
title: Flatten Paginated Results
difficulty: medium
prompt: |
  A paginated API returns `pages`, each `{ page, results: [...] }`. Implement
  `flattenPages(pages)` to return one flat array of every result across all
  pages, in order.

  `flatMap` is "map then flatten one level" in a single call.
functionName: flattenPages
starterCode: |
  function flattenPages(pages) {
    // your code here
  }
tests:
  - name: Case 1
    args:
      - - page: 1
          results:
            - Keyboard
            - Mug
        - page: 2
          results:
            - Monitor
    expected:
      - Keyboard
      - Mug
      - Monitor
  - name: Case 2
    args:
      - - page: 1
          results:
            - Lamp
        - page: 2
          results:
            - Pen
            - Chair
    expected:
      - Lamp
      - Pen
      - Chair
  - name: Case 3
    args:
      - - page: 1
          results: []
        - page: 2
          results:
            - Solo
    expected:
      - Solo
solution: |
  function flattenPages(pages) {
    return pages.flatMap((page) => page.results);
  }

id: 47
kind: react-hook
title: "useChecklist Hook"
difficulty: medium
prompt: |
  Write a hook `useChecklist(tasks)` that summarises a checklist for a
  progress header. `tasks` is an array of `{ label, done }` objects; return
  an object `{ total, completed, percent }` where:

  - `total` is the number of tasks,
  - `completed` is how many have `done: true`, and
  - `percent` is the completion percentage rounded to the nearest whole
    number — and `0` for an empty list (no dividing by zero!).

  Reach for `useMemo` so the summary is only rebuilt when `tasks` changes.

  For example, two done out of three returns
  `{ total: 3, completed: 2, percent: 67 }`.
functionName: useChecklist
starterCode: |
  function useChecklist(tasks) {
    // Return { total, completed, percent }.
  }
tests:
  - name: "Counts and rounds a partial checklist"
    args:
      - - { label: "Write tests", done: true }
        - { label: "Refactor", done: false }
        - { label: "Ship it", done: true }
    expected: { total: 3, completed: 2, percent: 67 }
  - name: "Everything done is 100%"
    args:
      - - { label: "Plan", done: true }
        - { label: "Build", done: true }
    expected: { total: 2, completed: 2, percent: 100 }
  - name: "An empty checklist is 0%, not NaN"
    args:
      - []
    expected: { total: 0, completed: 0, percent: 0 }
solution: |
  function useChecklist(tasks) {
    return useMemo(() => {
      const total = tasks.length;
      const completed = tasks.filter((task) => task.done).length;
      const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
      return { total, completed, percent };
    }, [tasks]);
  }
solutionExplanation: |
  Each field of the summary builds on the one before it, so compute them in
  order: `total` is free (`tasks.length`), `completed` is a filter-then-count
  (`filter(t => t.done).length` — `reduce` with `+ (task.done ? 1 : 0)` works
  too), and `percent` is the ratio of the two, scaled to 100 and passed
  through `Math.round` so 2-of-3 reads as `67` rather than
  `66.66666666666667`.

  The edge case is the whole reason the third test exists: an empty list
  makes the ratio `0 / 0`, which in JavaScript is `NaN` — and `NaN` doesn't
  throw, it just propagates silently into your UI as `NaN%`. Division is one
  of the few places where you must ask "can the denominator be zero?" every
  time; the `total === 0 ? 0 : ...` guard answers it before the division
  happens.

  `useMemo` wraps the work so the summary object keeps a stable identity
  until `tasks` actually changes. For an object return value that matters
  more than the saved computation: anything comparing by reference — a
  memoised child, a `useEffect` dependency — sees "unchanged" instead of a
  fresh object every render.

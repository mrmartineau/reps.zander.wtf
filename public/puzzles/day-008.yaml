day: 8
title: "Roman to Integer"
difficulty: hard
prompt: |
  Implement `romanToInt(s)` so it converts a Roman numeral string to its
  integer value. Symbols: I=1, V=5, X=10, L=50, C=100, D=500, M=1000.
  A smaller value before a larger one is subtracted (e.g. IV = 4, IX = 9).

  For example, `romanToInt("LVIII")` returns `58` (50 + 5 + 1 + 1 + 1), and
  `romanToInt("MCMXCIV")` returns `1994` (M=1000, CM=900, XC=90, IV=4).
functionName: romanToInt
starterCode: |
  function romanToInt(s) {
    // your code here
  }
tests:
  - name: "Simple additive"
    args: ["III"]
    expected: 3
  - name: "Subtractive pair"
    args: ["MCMXciv"]
    expected: 1994
  - name: "Mixed"
    args: ["LVIII"]
    expected: 58
solution: |
  function romanToInt(s) {
    const values = { I: 1, V: 5, X: 10, L: 50, C: 100, D: 500, M: 1000 };
    const upper = s.toUpperCase();
    let total = 0;
    for (let i = 0; i < upper.length; i++) {
      const current = values[upper[i]];
      const next = values[upper[i + 1]];
      // A smaller numeral before a larger one is subtracted (e.g. IV = 4).
      if (next > current) {
        total -= current;
      } else {
        total += current;
      }
    }
    return total;
  }
solutionExplanation: |
  Scan left to right. Normally you add each numeral's value, but when a smaller numeral sits *before* a larger one (e.g. `IV` = 4, `IX` = 9) it's subtracted instead. Comparing each value to its right-hand neighbour tells you which to do.

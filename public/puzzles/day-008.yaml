day: 8
title: "Roman to Integer"
prompt: |
  Implement `romanToInt(s)` so it converts a Roman numeral string to its
  integer value. Symbols: I=1, V=5, X=10, L=50, C=100, D=500, M=1000.
  A smaller value before a larger one is subtracted (e.g. IV = 4, IX = 9).
functionName: romanToInt
starterCode: |
  function romanToInt(s) {
    // your code here
  }
tests:
  - name: "Simple additive"
    args: ["III"]
    expected: 3
  - name: "Subtractive pair"
    args: ["MCMXciv"]
    expected: 1994
  - name: "Mixed"
    args: ["LVIII"]
    expected: 58

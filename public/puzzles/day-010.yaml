day: 10
title: "Caesar Cipher"
difficulty: hard
prompt: |
  Implement `caesar(str, shift)` so it shifts each letter forward by `shift`
  positions in the alphabet, wrapping around (z -> a). Preserve case. Leave
  non-letters unchanged. `shift` can be larger than 26.

  For example, `caesar("abc", 1)` returns `"bcd"`, and `caesar("Xyz", 3)`
  returns `"Abc"` — wrapping past `z` and keeping the capital `X` capital.
functionName: caesar
starterCode: |
  function caesar(str, shift) {
    // your code here
  }
tests:
  - name: "Basic shift"
    args: ["abc", 1]
    expected: "bcd"
  - name: "Wraps and preserves case"
    args: ["Xyz", 3]
    expected: "Abc"
  - name: "Shift over 26, keeps punctuation"
    args: ["Hello, World!", 29]
    expected: "Khoor, Zruog!"
solution: |
  function caesar(str, shift) {
    // Normalise the shift into 0–25 (handles values larger than 26).
    const steps = ((shift % 26) + 26) % 26;
    return str.replace(/[a-z]/gi, (letter) => {
      // 'A' is char code 65, 'a' is 97 — pick the right base for the letter's case.
      const base = letter <= 'Z' ? 65 : 97;
      const position = letter.charCodeAt(0) - base;
      const shifted = (position + steps) % 26;
      return String.fromCharCode(base + shifted);
    });
  }
solutionExplanation: |
  Shift each letter forward by `shift`, wrapping z→a. Normalise the shift into 0–25 with `((shift % 26) + 26) % 26` so values over 26 (or negative ones) behave. For each letter pick base `65` (uppercase) or `97` (lowercase), convert to a 0–25 position, add the shift mod 26, then convert back. The regex `/[a-z]/gi` means non-letters are skipped untouched, preserving spaces and punctuation.

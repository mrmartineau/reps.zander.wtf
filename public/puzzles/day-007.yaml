day: 7
title: "Deep Flatten"
prompt: |
  Implement `flatten(arr)` so it returns a single-level array containing every
  value from a nested array, at any depth, left to right.

  For example, `flatten([1, [2, 3], 4])` returns `[1, 2, 3, 4]`, and
  `flatten([1, [2, [3, [4]]]])` returns `[1, 2, 3, 4]` — no matter how deep the
  nesting goes.
functionName: flatten
starterCode: |
  function flatten(arr) {
    // your code here
  }
tests:
  - name: "One level"
    args: [[1, [2, 3], 4]]
    expected: [1, 2, 3, 4]
  - name: "Deeply nested"
    args: [[1, [2, [3, [4, [5]]]]]]
    expected: [1, 2, 3, 4, 5]
  - name: "Already flat"
    args: [[1, 2, 3]]
    expected: [1, 2, 3]
solution: |
  function flatten(arr) {
    return arr.reduce(
      (out, item) =>
        Array.isArray(item) ? out.concat(flatten(item)) : out.concat(item),
      []
    );
  }

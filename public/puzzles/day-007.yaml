day: 7
title: "Deep Flatten"
prompt: |
  Implement `flatten(arr)` so it returns a single-level array containing every
  value from a nested array, at any depth, left to right.
functionName: flatten
starterCode: |
  function flatten(arr) {
    // your code here
  }
tests:
  - name: "One level"
    args: [[1, [2, 3], 4]]
    expected: [1, 2, 3, 4]
  - name: "Deeply nested"
    args: [[1, [2, [3, [4, [5]]]]]]
    expected: [1, 2, 3, 4, 5]
  - name: "Already flat"
    args: [[1, 2, 3]]
    expected: [1, 2, 3]

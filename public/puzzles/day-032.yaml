day: 32
title: Filter Shipped Orders
difficulty: easy
prompt: |
  Implement `shippedOrders(orders)` to return a new array containing only the
  orders whose `status` is exactly `"shipped"`.

  `filter` keeps the items where your test is true — same shape, just shorter.
functionName: shippedOrders
starterCode: |
  function shippedOrders(orders) {
    // your code here
  }
tests:
  - name: Case 1
    args:
      - - id: 1
          customer: Ada
          product: Keyboard
          category: tech
          price: 80
          status: shipped
        - id: 2
          customer: Bram
          product: Mug
          category: home
          price: 12
          status: pending
        - id: 3
          customer: Ada
          product: Monitor
          category: tech
          price: 240
          status: shipped
        - id: 4
          customer: Cleo
          product: Notebook
          category: office
          price: 6
          status: cancelled
    expected:
      - id: 1
        customer: Ada
        product: Keyboard
        category: tech
        price: 80
        status: shipped
      - id: 3
        customer: Ada
        product: Monitor
        category: tech
        price: 240
        status: shipped
  - name: Case 2
    args:
      - - id: 10
          customer: Dee
          product: Lamp
          category: home
          price: 45
          status: shipped
        - id: 11
          customer: Eve
          product: Pen
          category: office
          price: 3
          status: pending
        - id: 12
          customer: Dee
          product: Chair
          category: home
          price: 90
          status: cancelled
    expected:
      - id: 10
        customer: Dee
        product: Lamp
        category: home
        price: 45
        status: shipped
  - name: Case 3
    args:
      - - id: 20
          customer: Fin
          product: Cable
          category: tech
          price: 9
          status: shipped
        - id: 21
          customer: Fin
          product: Desk
          category: home
          price: 150
          status: shipped
    expected:
      - id: 20
        customer: Fin
        product: Cable
        category: tech
        price: 9
        status: shipped
      - id: 21
        customer: Fin
        product: Desk
        category: home
        price: 150
        status: shipped
solution: |
  function shippedOrders(orders) {
    return orders.filter((order) => order.status === 'shipped');
  }
solutionExplanation: |
  `filter` keeps only the items where your test is true — same object shape, just a shorter list. Use `===` for an exact `"shipped"` match.

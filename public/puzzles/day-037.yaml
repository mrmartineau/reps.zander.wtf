day: 37
title: Distinct Categories
difficulty: easy
prompt: |
  Implement `uniqueCategories(orders)` to return an array of the unique
  `category` values, in first-seen order.

  Map to the categories, then dedupe with a `Set` and spread back to an array.
functionName: uniqueCategories
starterCode: |
  function uniqueCategories(orders) {
    // your code here
  }
tests:
  - name: Case 1
    args:
      - - id: 1
          customer: Ada
          product: Keyboard
          category: tech
          price: 80
          status: shipped
        - id: 2
          customer: Bram
          product: Mug
          category: home
          price: 12
          status: pending
        - id: 3
          customer: Ada
          product: Monitor
          category: tech
          price: 240
          status: shipped
        - id: 4
          customer: Cleo
          product: Notebook
          category: office
          price: 6
          status: cancelled
    expected:
      - tech
      - home
      - office
  - name: Case 2
    args:
      - - id: 10
          customer: Dee
          product: Lamp
          category: home
          price: 45
          status: shipped
        - id: 11
          customer: Eve
          product: Pen
          category: office
          price: 3
          status: pending
        - id: 12
          customer: Dee
          product: Chair
          category: home
          price: 90
          status: cancelled
    expected:
      - home
      - office
  - name: Case 3
    args:
      - - id: 20
          customer: Fin
          product: Cable
          category: tech
          price: 9
          status: shipped
        - id: 21
          customer: Fin
          product: Desk
          category: home
          price: 150
          status: shipped
    expected:
      - tech
      - home
solution: |
  function uniqueCategories(orders) {
    return [...new Set(orders.map((order) => order.category))];
  }

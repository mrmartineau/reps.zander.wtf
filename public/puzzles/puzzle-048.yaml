id: 48
title: "Group the Anagrams"
difficulty: hard
prompt: |
  Implement `groupAnagrams(words)` so it groups words that are anagrams of
  each other (same letters, rearranged) into sub-arrays.

  Groups appear in the order their **first word** appears in the input, and
  words keep their input order within a group.

  For example,
  `groupAnagrams(["eat", "tea", "tan", "ate", "nat", "bat"])` returns
  `[["eat", "tea", "ate"], ["tan", "nat"], ["bat"]]`.

  If nothing matches, every word ends up in a group of its own.
functionName: groupAnagrams
starterCode: |
  function groupAnagrams(words) {
    // your code here
  }
tests:
  - name: "Classic mix"
    args: [["eat", "tea", "tan", "ate", "nat", "bat"]]
    expected: [["eat", "tea", "ate"], ["tan", "nat"], ["bat"]]
  - name: "Two clear clusters"
    args: [["listen", "silent", "enlist", "google", "gooegl"]]
    expected: [["listen", "silent", "enlist"], ["google", "gooegl"]]
  - name: "No anagrams at all"
    args: [["cat", "dog", "bird"]]
    expected: [["cat"], ["dog"], ["bird"]]
solution: |
  function groupAnagrams(words) {
    const groups = {};
    for (const word of words) {
      const key = word.split("").sort().join("");
      if (!groups[key]) {
        groups[key] = [];
      }
      groups[key].push(word);
    }
    return Object.values(groups);
  }
solutionExplanation: |
  The core insight is finding a **canonical form**: a single value that is
  identical for every anagram of a word and different for everything else.
  Sort the word's letters — `"eat"`, `"tea"`, and `"ate"` all become
  `"aet"`. Two words are anagrams exactly when their sorted letters match.

  With that key in hand, the rest is the standard group-by pattern:

  1. For each word, compute `word.split("").sort().join("")` (strings have no
     `.sort()`, so split to characters, sort, and join back).
  2. Use the key to look up a bucket in a plain object, creating an empty
     array on first sight: `if (!groups[key]) groups[key] = []`.
  3. Push the word into its bucket.
  4. Return `Object.values(groups)`.

  The ordering requirements come along for free, which is the elegant part:
  pushing in input order keeps words ordered *within* each group, and
  JavaScript objects preserve string keys in insertion order, so
  `Object.values` yields the groups in the order each one's first word was
  seen. (Don't return a `Map` here — the runner deep-compares plain
  arrays/objects.)

  Without the canonical-form idea you might compare every word against every
  other with an `areAnagrams` helper — that works but is O(n²) comparisons
  and the bookkeeping for "which group did I join?" gets messy. The sorted
  key turns it into one pass with a lookup table.

  The no-anagrams edge case needs no special handling: every word produces a
  unique key, so every bucket holds exactly one word — `["cat"], ["dog"],
  ["bird"]` each in their own group.

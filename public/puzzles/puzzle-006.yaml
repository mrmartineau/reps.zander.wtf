id: 6
title: "Count Vowels"
difficulty: easy
prompt: |
  Implement `countVowels(str)` so it returns the number of vowels
  (a, e, i, o, u — case insensitive) in `str`.

  For example, `countVowels("Hello World")` returns `3` — the `e`, `o` and `o`.
functionName: countVowels
starterCode: |
  function countVowels(str) {
    // your code here
  }
tests:
  - name: "Mixed text"
    args: ["Hello World"]
    expected: 3
  - name: "No vowels"
    args: ["rhythm"]
    expected: 0
  - name: "All vowels, mixed case"
    args: ["AeIoU"]
    expected: 5
solution: |
  function countVowels(str) {
    // match() returns every vowel, or null when there are none.
    const vowels = str.match(/[aeiou]/gi);
    return vowels ? vowels.length : 0;
  }
solutionExplanation: |
  `match(/[aeiou]/gi)` returns an array of every vowel — the `g` flag finds all matches, `i` makes it case-insensitive. When there are no vowels it returns `null` instead of an empty array, so guard with `? vowels.length : 0`.

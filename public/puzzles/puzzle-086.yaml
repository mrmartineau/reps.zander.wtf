id: 86
kind: react-component
title: "Deduplicated Tag List"
difficulty: medium
prompt: |
  Build a `TagList` component that takes a `tags` prop (an array of strings)
  and renders each *distinct* tag as `<li className="tag">` inside a `<ul>`.

  Duplicates are compared case-insensitively, and the **first** occurrence's
  casing wins: `["React", "react", "REACT"]` renders a single `React` tag.

  For example, `tags={['js', 'css', 'JS', 'html']}` renders three tags:
  `js`, `css`, `html`.
componentName: TagList
starterCode: |
  function TagList({ tags }) {
    // Return a <ul> of unique tags (case-insensitive, first casing wins).
  }
tests:
  - name: "Drops exact and case-variant duplicates"
    props: { tags: ["js", "css", "JS", "html"] }
    assert: { selector: "li.tag", count: 3 }
  - name: "The first occurrence's casing wins"
    props: { tags: ["React", "react", "REACT"] }
    assert: { selector: "li.tag", count: 1, text: "React" }
  - name: "No tags renders an empty list"
    props: { tags: [] }
    assert: { selector: "li", count: 0 }
solution: |
  function TagList({ tags }) {
    const seen = new Set();
    const unique = tags.filter((tag) => {
      const key = tag.toLowerCase();
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
    return (
      <ul>
        {unique.map((tag) => (
          <li key={tag.toLowerCase()} className="tag">
            {tag}
          </li>
        ))}
      </ul>
    );
  }
solutionExplanation: |
  The key idea is to dedupe on a *normalised* key while keeping the
  *original* value. Lowercasing each tag gives you a canonical identity
  (`"React"`, `"react"`, `"REACT"` all become `"react"`), but you never
  display the key — you display the tag as it first appeared.

  A `Set` of seen keys plus `filter` does this in one pass: for each tag,
  compute its key, skip it if the key is already in the set, otherwise record
  the key and keep the tag. Because `filter` walks the array in order, the
  first spelling is automatically the one that survives — no extra logic
  needed for "first casing wins".

  You might have reached for `[...new Set(tags)]`, the usual dedupe one-liner
  — but that compares exact strings, so `"js"` and `"JS"` both survive and
  the first test fails. The other tempting shortcut,
  `[...new Set(tags.map(t => t.toLowerCase()))]`, dedupes correctly but
  *displays* the lowercased keys, losing `React`'s capital R. Keeping the
  key and the value separate is what handles both tests at once.

id: 96
kind: react-component
title: "Grouped Contact List"
difficulty: hard
prompt: |
  Build a `ContactList` component that takes a `names` prop (an array of
  capitalised names in no particular order) and renders them like a phone's
  contacts screen — grouped by first letter:

  - one `<section>` per distinct starting letter, with the sections in
    alphabetical order,
  - each section containing an `<h2>` showing the letter, and
  - a `<ul>` of that letter's names as `<li>`s, sorted alphabetically within
    the group.

  For example, `names={['Grace', 'Alan', 'Ada']}` renders an **A** section
  listing Ada then Alan, followed by a **G** section listing Grace.
componentName: ContactList
starterCode: |
  function ContactList({ names }) {
    // Group names by first letter, then render a <section> per letter.
  }
tests:
  - name: "Renders one section per starting letter"
    props: { names: ["Grace", "Alan", "Ada", "Linus"] }
    assert: { selector: "section", count: 3 }
  - name: "Sections come in alphabetical order with letter headings"
    props: { names: ["Grace", "Alan", "Ada", "Linus"] }
    assert: { selector: "section:first-child h2", text: "A" }
  - name: "Names are sorted within their group"
    props: { names: ["Grace", "Alan", "Ada", "Linus"] }
    assert: { selector: "section:first-child li:first-child", text: "Ada" }
solution: |
  function ContactList({ names }) {
    const groups = {};
    for (const name of names) {
      const letter = name[0];
      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(name);
    }
    return (
      <div>
        {Object.keys(groups)
          .sort()
          .map((letter) => (
            <section key={letter}>
              <h2>{letter}</h2>
              <ul>
                {[...groups[letter]].sort().map((name) => (
                  <li key={name}>{name}</li>
                ))}
              </ul>
            </section>
          ))}
      </div>
    );
  }
solutionExplanation: |
  The unlock is to stop thinking of this as one rendering problem and treat
  it as a *data-shaping* problem followed by a routine render. The input is a
  flat array, but the UI is two levels deep — so first build the intermediate
  shape the UI actually wants: an object mapping each letter to its names
  (`{ A: ['Alan', 'Ada'], G: ['Grace'], L: ['Linus'] }`).

  Grouping is one pass: take `name[0]` as the key, create the bucket on first
  sight (`if (!groups[letter]) groups[letter] = []`), and push. This
  group-by-key loop is one of the most reusable patterns in UI work —
  orders by status, events by day, files by extension all reduce to it.

  Then notice there are *two separate sorts*, and missing either one fails a
  different test. Object key order follows insertion, and `Grace` arrives
  before any A-name — so without `Object.keys(groups).sort()`, the G section
  renders first. Inside each group the names sit in arrival order (`Alan`
  before `Ada`), so each bucket needs its own `.sort()` too. Sorting the
  *input* once up front actually solves both at a stroke — sorted names fill
  sorted buckets in sorted order — which is a perfectly good alternative;
  the two-sorts version just makes the structure more explicit.

  From there the JSX is nested list rendering: map the letters to sections,
  and within each, map its names to `<li>`s — the same `.map` pattern, one
  level deeper.

id: 64
title: "Expand Number Ranges"
difficulty: medium
prompt: |
  Implement `expandRanges(spec)` so it expands a page-selection style string
  into a flat array of numbers. The spec is a comma-separated list where each
  part is either a single number (`"5"`) or a `low-high` range (`"7-8"`,
  inclusive on both ends).

  An empty string returns an empty array `[]`.

  For example, `expandRanges("1-3,5,7-8")` returns `[1, 2, 3, 5, 7, 8]`.
functionName: expandRanges
starterCode: |
  function expandRanges(spec) {
    // your code here
  }
tests:
  - name: "Ranges and singles mixed"
    args: ["1-3,5,7-8"]
    expected: [1, 2, 3, 5, 7, 8]
  - name: "Only single numbers"
    args: ["10,12,20"]
    expected: [10, 12, 20]
  - name: "Empty spec"
    args: [""]
    expected: []
solution: |
  function expandRanges(spec) {
    if (spec === "") return [];

    const result = [];
    for (const part of spec.split(",")) {
      if (part.includes("-")) {
        const [low, high] = part.split("-").map(Number);
        for (let n = low; n <= high; n += 1) {
          result.push(n);
        }
      } else {
        result.push(Number(part));
      }
    }
    return result;
  }
solutionExplanation: |
  The core insight: this is a **two-level split** problem. The commas separate
  independent pieces, and each piece is then either a plain number or itself
  splittable on `-`. Break the parsing into those two layers and each layer
  becomes trivial.

  Step by step:

  1. `spec.split(",")` turns `"1-3,5,7-8"` into `["1-3", "5", "7-8"]`.
  2. For each part, decide which kind it is: `part.includes("-")` means it's a
     range, otherwise it's a single number.
  3. A single number just needs converting: `Number(part)` — don't push the
     string `"5"`, push the number `5`.
  4. A range splits again on `-`, converts both ends to numbers, then a small
     `for` loop pushes `low` through `high` inclusive (`n <= high`, not
     `n < high`).

  The gotcha the edge case guards: `"".split(",")` does **not** give you an
  empty array — it gives `[""]`, an array containing one empty string.
  `Number("")` is `0`, so without the early `if (spec === "") return []`
  you'd return `[0]`. Handling the empty spec before splitting is the
  cleanest fix.

  Two smaller traps worth naming: forgetting `Number()` and returning strings
  (deep-equal will reject `["1", "2"]`), and an off-by-one that makes `"7-8"`
  expand to just `[7]` because the loop used `<` instead of `<=`.

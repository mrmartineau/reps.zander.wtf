id: 88
title: "Swap the Case"
difficulty: easy
prompt: |
  Implement `swapCase(str)` so it flips the case of every letter: uppercase
  letters become lowercase, lowercase letters become uppercase. Characters
  that aren't letters — digits, spaces, punctuation — stay exactly as they
  are.

  For example, `swapCase("Hello World")` returns `"hELLO wORLD"`.
functionName: swapCase
starterCode: |
  function swapCase(str) {
    // your code here
  }
tests:
  - name: "A greeting"
    args: ["Hello World"]
    expected: "hELLO wORLD"
  - name: "Mixed casing"
    args: ["JavaScript"]
    expected: "jAVAsCRIPT"
  - name: "No letters at all"
    args: ["123!?"]
    expected: "123!?"
solution: |
  function swapCase(str) {
    let result = "";
    for (const ch of str) {
      if (ch === ch.toUpperCase()) {
        result += ch.toLowerCase();
      } else {
        result += ch.toUpperCase();
      }
    }
    return result;
  }
solutionExplanation: |
  The core insight: you can detect a character's case by comparing it to its
  own uppercase form. If `ch === ch.toUpperCase()`, the character is either an
  uppercase letter or a non-letter — in both cases, `ch.toLowerCase()` is the
  right answer (it lowercases the letter, and leaves digits and punctuation
  untouched). Otherwise the character must be lowercase, so uppercase it.

  Step by step:

  1. Start with an empty result string.
  2. For each character, ask: "does uppercasing change you?"
     - No change → it's uppercase or a non-letter → append `ch.toLowerCase()`.
     - It changed → it's a lowercase letter → append `ch.toUpperCase()`.
  3. Return the accumulated string.

  The edge case (`"123!?"`) shows why this trick is safe for non-letters:
  `"1".toUpperCase()` is still `"1"`, so the first branch fires and
  `"1".toLowerCase()` — also `"1"` — gets appended. Non-letters pass through
  unchanged without any special handling.

  You might have reached for a regex check like `/[a-z]/` — that works for
  ASCII, but the compare-to-yourself trick needs no character ranges at all
  and is a pattern worth keeping in your pocket.

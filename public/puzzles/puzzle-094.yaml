id: 94
title: "Find the Median"
difficulty: medium
prompt: |
  Implement `median(nums)` so it returns the middle value of the numbers when
  sorted. For an even count there is no single middle value — return the mean
  of the two middle values instead.

  The input is never empty, and you must **not mutate the caller's array** —
  sort a copy.

  For example, `median([5, 1, 9, 3, 7])` sorts to `[1, 3, 5, 7, 9]` and
  returns `5`, while `median([1, 2, 3, 4])` returns `2.5` (the mean of `2`
  and `3`).
functionName: median
starterCode: |
  function median(nums) {
    // your code here
  }
tests:
  - name: "Odd count"
    args: [[5, 1, 9, 3, 7]]
    expected: 5
  - name: "Unsorted with negatives"
    args: [[10, -2, 4]]
    expected: 4
  - name: "Even count"
    args: [[1, 2, 3, 4]]
    expected: 2.5
solution: |
  function median(nums) {
    const sorted = [...nums].sort((a, b) => a - b);
    const mid = Math.floor(sorted.length / 2);
    if (sorted.length % 2 === 1) {
      return sorted[mid];
    }
    return (sorted[mid - 1] + sorted[mid]) / 2;
  }
solutionExplanation: |
  Two ideas unlock this puzzle: **sort a copy, then index into the middle** —
  and handle odd and even lengths as two distinct cases.

  First, the copy. `Array.prototype.sort` sorts **in place**, so a bare
  `nums.sort(...)` silently rearranges the caller's array — a classic
  real-world bug. Spread into a new array first: `[...nums].sort(...)`
  (or `nums.slice().sort(...)`). Also note the comparator: without
  `(a, b) => a - b`, JavaScript sorts numbers *as strings*, so `[10, -2, 4]`
  would order as `[-2, 10, 4]` and you'd pick the wrong middle.

  Now the middle. Let `mid = Math.floor(length / 2)`:

  - **Odd length** — there's a true middle element, and `mid` is its index
    (length 5 → `mid` 2, the third element). Return `sorted[mid]`.
  - **Even length** — the gotcha the third test guards. There are *two*
    middle elements, at `mid - 1` and `mid` (length 4 → indexes 1 and 2).
    Return their mean. For `[1, 2, 3, 4]` that's `(2 + 3) / 2 = 2.5`.

  A naive `sorted[length / 2]` "works" for odd lengths only by accident of
  flooring elsewhere, and for even lengths it just picks the upper of the two
  middles — `[1, 2, 3, 4]` would give `3` instead of `2.5`. Splitting on
  `length % 2` makes both cases explicit and correct.

day: 38
title: Join Orders to Customers
difficulty: hard
prompt: |
  Implement `withTier(orders, customers)` to return the orders, each with an
  added `tier` field — the matching customer's tier, or `"none"` if there's no
  match.

  Index the customers into a `Map` of name → tier first, then `map` the orders
  against it (avoids a slow `.find` inside the loop).
functionName: withTier

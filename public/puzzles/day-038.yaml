solution: |
  function withTier(orders, customers) {
    const tierByName = new Map(customers.map((c) => [c.name, c.tier]));
    return orders.map((order) => ({
      ...order,
      tier: tierByName.get(order.customer) ?? 'none',
    }));
  }
solutionExplanation: |
  Indexing beats searching. Build a `Map` of name→tier once (O(n)), then `map` the orders, looking each tier up in O(1). Doing `.find` inside the loop instead would be O(n²). `?? 'none'` covers any customer with no match.

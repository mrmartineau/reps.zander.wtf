name: Validate puzzles

# Runs only when a PR touches puzzle files (i.e. a puzzle was added or changed),
# or when the validator/scripts themselves change.
on:
  pull_request:
    paths:
      - 'public/puzzles/**'
      - 'submissions/**'
      - 'scripts/validate-puzzles.mjs'
      - '.github/workflows/validate-puzzles.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Show which puzzle files this PR changed, for reviewer context.
      - name: List changed puzzle files
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          echo "Changed puzzle files in this PR:"
          git diff --name-only "origin/${{ github.base_ref }}"...HEAD \
            | grep -E '^(public/puzzles|submissions)/.*\.yaml$' || echo "  (none)"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Live puzzles: structure + every reference solution must pass its tests,
      # day numbers must be unique.
      - name: Validate live puzzles
        run: pnpm validate-puzzles

      # Proposed puzzles in submissions/ get the same structural + correctness
      # check (no-op if the folder has none).
      - name: Validate submitted puzzles
        run: pnpm validate-submissions

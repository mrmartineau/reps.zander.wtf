id: 0 # leave as 0 — a maintainer assigns the real id on acceptance
kind: react-hook
title: "useSlug Hook"
difficulty: easy
prompt: |
  Write a hook `useSlug(title)` that turns a post title into a URL-friendly
  slug:

  - lowercase everything,
  - replace each run of characters that aren't `a–z` or `0–9` with a single
    hyphen, and
  - strip any leading or trailing hyphens.

  Reach for `useMemo` so the slug is only recomputed when `title` changes.

  For example, `useSlug('  10 Tips & Tricks!  ')` returns `"10-tips-tricks"`.
functionName: useSlug
starterCode: |
  function useSlug(title) {
    // Return the slugified title.
  }
tests:
  - name: "Lowercases and hyphenates"
    args: ["Hello World"]
    expected: "hello-world"
  - name: "Collapses punctuation runs into one hyphen"
    args: ["  10 Tips & Tricks!  "]
    expected: "10-tips-tricks"
  - name: "Nothing usable leaves an empty slug"
    args: ["!!!"]
    expected: ""
solution: |
  function useSlug(title) {
    return useMemo(
      () =>
        title
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, ""),
      [title],
    );
  }
solutionExplanation: |
  The insight is to define the slug by what's *allowed* rather than chasing
  everything that's forbidden. A negated character class — `[^a-z0-9]` —
  matches any character that isn't a lowercase letter or digit, so spaces,
  ampersands, and exclamation marks all fall to the same rule. (Lowercasing
  *first* is what lets the class stay this small.)

  The `+` quantifier is the difference between `10-tips-tricks` and
  `10-tips---tricks`: it makes the regex consume each *run* of junk (` & `
  is three characters) as a single match, replaced by a single hyphen.
  Replacing per-character and then collapsing repeated hyphens in a second
  pass also works — the `+` just does it in one.

  Edges are where slugs get scruffy. The leading/trailing spaces in the
  example become hyphens (`-10-tips-tricks-`), so a final
  `replace(/^-+|-+$/g, "")` trims both ends; that same rule is what makes
  the all-punctuation input collapse to `"-"` and then to the empty string,
  rather than crashing or returning stray hyphens.

  `useMemo` with `[title]` caches the result between renders — slugging is
  cheap, but the habit matters: derived strings, like derived arrays, only
  need recomputing when their inputs change.

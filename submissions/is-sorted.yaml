id: 0 # leave as 0 — a maintainer assigns the real id on acceptance
title: "Is It Sorted?"
difficulty: easy
prompt: |
  Implement `isSorted(nums)` so it returns `true` when the array is in
  **non-decreasing** order — each element is less than or equal to the next.
  Equal neighbours are allowed: `[1, 2, 2, 3]` is sorted.

  An empty array or a single-element array is always sorted.

  For example, `isSorted([1, 2, 3])` returns `true`, and
  `isSorted([3, 1, 2])` returns `false`.
functionName: isSorted
starterCode: |
  function isSorted(nums) {
    // your code here
  }
tests:
  - name: "Equal neighbours are still sorted"
    args: [[1, 2, 2, 3]]
    expected: true
  - name: "One value out of place"
    args: [[1, 5, 3, 7]]
    expected: false
  - name: "Empty array"
    args: [[]]
    expected: true
solution: |
  function isSorted(nums) {
    for (let i = 1; i < nums.length; i += 1) {
      if (nums[i] < nums[i - 1]) {
        return false;
      }
    }
    return true;
  }
solutionExplanation: |
  The core insight: an array is sorted exactly when **every adjacent pair**
  is in order. You don't need to compare every element with every other —
  if no neighbour pair ever *decreases*, no far-apart pair can be out of
  order either. So scan once, looking only for a single violation.

  Step by step:

  1. Loop `i` from `1` (not `0`) so that `nums[i - 1]` is always a real
     element — each iteration looks at one pair, `nums[i - 1]` and `nums[i]`.
  2. The moment you find `nums[i] < nums[i - 1]`, the order is broken —
     return `false` immediately; nothing later can fix it.
  3. If the loop finishes without finding a violation, return `true`.

  Notice the comparison is `<`, a *strict* decrease. "Non-decreasing" means
  equal neighbours are fine, so `[1, 2, 2, 3]` must pass — a condition like
  `nums[i] <= nums[i - 1]` would wrongly reject the repeated `2`. Checking
  for the **violation** (`<`) rather than the rule (`>=`) keeps the
  equal-neighbours case correct by construction.

  The edge case costs nothing: for `[]` (or a single element) the loop
  starts at `i = 1`, the condition `1 < nums.length` is already false, the
  body never runs, and you fall through to `true` — which is right, because
  there's no pair that *could* be out of order. "Vacuously true" is doing
  the work for you.

  A neat alternative is `nums.every((n, i) => i === 0 || nums[i - 1] <= n)`
  — same pair-wise idea, with `every` handling the early exit. Either way,
  resist the urge to sort a copy and compare: that's O(n log n) work and an
  extra array to answer a question one linear scan settles.

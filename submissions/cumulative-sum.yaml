id: 0 # leave as 0 — a maintainer assigns the real id on acceptance
title: "Cumulative Sum"
difficulty: easy
prompt: |
  Implement `cumulativeSum(nums)` so it returns the running totals of the
  array: each element of the result is the sum of all input elements up to
  and including that position.

  An empty array returns `[]`.

  For example, `cumulativeSum([1, 2, 3])` returns `[1, 3, 6]` — that's `1`,
  then `1 + 2`, then `1 + 2 + 3`.
functionName: cumulativeSum
starterCode: |
  function cumulativeSum(nums) {
    // your code here
  }
tests:
  - name: "Simple ascending values"
    args: [[1, 2, 3]]
    expected: [1, 3, 6]
  - name: "Negatives can shrink the total"
    args: [[5, -2, 4, -7]]
    expected: [5, 3, 7, 0]
  - name: "Empty array"
    args: [[]]
    expected: []
solution: |
  function cumulativeSum(nums) {
    const totals = [];
    let runningTotal = 0;
    for (const n of nums) {
      runningTotal += n;
      totals.push(runningTotal);
    }
    return totals;
  }
solutionExplanation: |
  The core insight: you don't need to re-add everything from the start for
  each position. Keep **one running total** that you update as you walk the
  array, and snapshot it after every step. Each new total is just *the
  previous total plus the current element* — that single observation turns
  a potentially quadratic re-summing job into one linear pass.

  Step by step:

  1. Start `runningTotal` at `0` and `totals` as an empty array.
  2. For each number, add it to `runningTotal` first.
  3. Then push the updated total. The order matters: add, *then* push —
     pushing first would record the total *before* the current element,
     shifting every result one place.

  Trace the second test to see why the running approach handles negatives
  with no extra effort: `5` → `5`, then `+(-2)` → `3`, then `+4` → `7`,
  then `+(-7)` → `0`. The total is allowed to go down; "cumulative" doesn't
  mean "increasing".

  The empty-array edge case is free: the loop never runs and you return the
  untouched `[]`.

  You might have tried `nums.map((n, i) => nums.slice(0, i + 1).reduce(...))`
  — it gives the right answer, but it re-sums a growing prefix for every
  element. The running-total accumulator is both simpler and faster, and
  it's the same "prefix sums" idea that underpins many interval and
  statistics tricks later on.

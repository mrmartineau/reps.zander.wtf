id: 0 # leave as 0 — a maintainer assigns the real id on acceptance
title: "Zip Two Arrays"
difficulty: medium
prompt: |
  Implement `zip(a, b)` so it pairs up the two arrays element by element:
  the result is `[[a[0], b[0]], [a[1], b[1]], ...]`.

  If the arrays have different lengths, stop at the shorter one — extra
  elements are dropped. If either array is empty, the result is `[]`.

  For example, `zip(["x", "y"], [1, 2])` returns `[["x", 1], ["y", 2]]`.
functionName: zip
starterCode: |
  function zip(a, b) {
    // your code here
  }
tests:
  - name: "Equal lengths"
    args: [["x", "y"], [1, 2]]
    expected: [["x", 1], ["y", 2]]
  - name: "Truncates to the shorter array"
    args: [[1, 2, 3, 4], ["a", "b"]]
    expected: [[1, "a"], [2, "b"]]
  - name: "One array empty"
    args: [[], [1, 2, 3]]
    expected: []
solution: |
  function zip(a, b) {
    const length = Math.min(a.length, b.length);
    const pairs = [];
    for (let i = 0; i < length; i += 1) {
      pairs.push([a[i], b[i]]);
    }
    return pairs;
  }
solutionExplanation: |
  The core insight: walk **one shared index** across both arrays at once, and
  decide *up front* how far that index can go — `Math.min(a.length,
  b.length)`. Once you've named that bound, the rest is a plain loop.

  Step by step:

  1. Compute `length = Math.min(a.length, b.length)`. This single line *is*
     the truncation rule: pairing stops as soon as either array runs out.
  2. Loop `i` from `0` up to (but not including) `length`.
  3. At each step push the two-element array `[a[i], b[i]]`.

  The gotcha the edge case guards: if you loop to `a.length` regardless,
  then with a longer `a` you'd read `b[i]` past the end and get `undefined`,
  producing pairs like `[3, undefined]` — and `zip([], [1, 2, 3])` only
  returns `[]` because the *shorter* length wins. Taking the minimum first
  makes both problems impossible rather than patched.

  You might have tried `a.map((x, i) => [x, b[i]])` — close, but it iterates
  over **all** of `a`, so it breaks exactly when `a` is the longer array. If
  you like the `map` style, map over the shorter array instead, or build an
  index range of the right length first. The explicit loop with a
  precomputed bound is the version that reads as exactly what it does.

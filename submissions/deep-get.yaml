id: 0 # leave as 0 — a maintainer assigns the real id on acceptance
title: "Deep Get"
difficulty: medium
prompt: |
  Config objects nest deep, and reaching into them with `a.b.c` crashes the
  moment a level is missing. Implement `deepGet(obj, path, fallback)` where
  `path` is a dotted string like `"user.profile.name"`. Walk the nested
  objects one segment at a time and return the value at the end of the path
  — or `fallback` if any segment along the way is missing or isn't an
  object.

  For example:

  ```js
  const data = { user: { profile: { name: "Ada" } } };

  deepGet(data, "user.profile.name", "unknown"); // → "Ada"
  deepGet(data, "user.settings.theme", "dark");  // → "dark"
  ```
functionName: deepGet
starterCode: |
  function deepGet(obj, path, fallback) {
    // your code here
  }
tests:
  - name: "Full path exists"
    args:
      [
        { user: { profile: { name: "Ada", role: "engineer" } } },
        "user.profile.name",
        "unknown",
      ]
    expected: "Ada"
  - name: "Shallow path"
    args:
      [
        { theme: "dark", fontSize: 14 },
        "fontSize",
        12,
      ]
    expected: 14
  - name: "Broken path returns fallback"
    args:
      [
        { user: { profile: { name: "Ada" } } },
        "user.settings.theme",
        "light",
      ]
    expected: "light"
solution: |
  function deepGet(obj, path, fallback) {
    const segments = path.split(".");
    let current = obj;

    for (const segment of segments) {
      const isObject = typeof current === "object" && current !== null;
      if (!isObject || !(segment in current)) {
        return fallback;
      }
      current = current[segment];
    }

    return current;
  }
solutionExplanation: |
  The core insight: a dotted path is just a **list of steps**, and the whole
  problem is "take one step at a time, and bail out the moment a step is
  impossible". `path.split(".")` turns `"user.profile.name"` into
  `["user", "profile", "name"]`, and from there it's a single loop.

  Build it up:

  1. Keep a `current` pointer that starts at the whole object.
  2. For each segment, check that stepping is even possible: `current` must
     be a real object, and it must actually have that property. The
     `segment in current` check asks exactly that.
  3. If the step is possible, descend: `current = current[segment]`. If not,
     stop immediately and return `fallback` — there's no point continuing
     down a path that's already broken.
  4. If the loop finishes, `current` is the value at the end of the path.

  The gotcha the edge case guards: when a middle segment is missing, naive
  code like `obj[a][b][c]` doesn't return `undefined` — it **throws**
  ("cannot read properties of undefined"), because you're indexing into
  `undefined`. The per-step check is what converts that crash into a clean
  `fallback`.

  One subtlety worth knowing: `typeof null === "object"` is a famous
  JavaScript quirk, so the object check needs the explicit
  `current !== null` guard — otherwise a `null` in the middle of the data
  would slip past and crash on the next step.

  You may know optional chaining (`obj?.user?.settings?.theme ?? fallback`),
  which solves the *fixed-path* version beautifully — but it can't handle a
  path that arrives as a runtime string. That's exactly when you write the
  loop.

id: 0 # leave as 0 — a maintainer assigns the real id on acceptance
kind: react-component
title: "Segmented Progress Bar"
difficulty: medium
prompt: |
  Build a `ProgressBar` component that takes `value` and `max` props and
  renders a `<div className="bar">` containing exactly `max` `<span>`
  elements, each with the class `segment`. The first `value` of them must
  *also* have the class `filled`.

  If `value` is larger than `max`, clamp it — never render more filled
  segments than there are segments.

  For example, `value={3} max={5}` renders five segments where the first
  three are `segment filled` and the last two are just `segment`.
componentName: ProgressBar
starterCode: |
  function ProgressBar({ value, max }) {
    // Return a <div className="bar"> containing max <span> segments.
  }
tests:
  - name: "Renders one segment per unit of max"
    props: { value: 3, max: 5 }
    assert: { selector: ".bar .segment", count: 5 }
  - name: "Fills the first value segments"
    props: { value: 3, max: 5 }
    assert: { selector: ".segment.filled", count: 3 }
  - name: "Clamps overflow to max"
    props: { value: 9, max: 4 }
    assert: { selector: ".segment.filled", count: 4 }
solution: |
  function ProgressBar({ value, max }) {
    const filled = Math.min(value, max);
    return (
      <div className="bar">
        {Array.from({ length: max }, (_, i) => (
          <span key={i} className={i < filled ? "segment filled" : "segment"} />
        ))}
      </div>
    );
  }
solutionExplanation: |
  The trick is that there's nothing to map over — `max` is just a number, so
  you first have to *manufacture* a list of that length. `Array.from({ length:
  max }, (_, i) => ...)` is the standard recipe: it builds an array of `max`
  items and hands the callback each index `i`. (`[...Array(max)].map(...)`
  works too.)

  Once you have indices, each segment's class is a comparison against the
  fill level: indices below `filled` get `"segment filled"`, the rest get
  `"segment"`. Building the class string with a ternary keeps both spellings
  in one place.

  The edge-case test guards the clamp. A naive `i < value` happily marks every
  segment filled when `value` overshoots `max` — which here still renders 4
  filled segments, but think of a percentage label or a partial-fill style: the
  unclamped number leaks out. Computing `Math.min(value, max)` once, up front,
  means the render logic never sees an out-of-range value.

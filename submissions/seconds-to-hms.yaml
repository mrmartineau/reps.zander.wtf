id: 0 # leave as 0 — a maintainer assigns the real id on acceptance
title: "Format a Duration"
difficulty: medium
prompt: |
  Your video player shows elapsed time as a clock-style string. Implement
  `secondsToHMS(totalSeconds)` so it formats a non-negative number of
  seconds as `"HH:MM:SS"`, with each part zero-padded to two digits.

  For example, `secondsToHMS(3661)` returns `"01:01:01"` — that's 1 hour,
  1 minute and 1 second.

  Zero seconds formats as `"00:00:00"`.
functionName: secondsToHMS
starterCode: |
  function secondsToHMS(totalSeconds) {
    // your code here
  }
tests:
  - name: "One hour, one minute, one second"
    args: [3661]
    expected: "01:01:01"
  - name: "An afternoon's worth of seconds"
    args: [45296]
    expected: "12:34:56"
  - name: "Zero"
    args: [0]
    expected: "00:00:00"
solution: |
  function secondsToHMS(totalSeconds) {
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    const pad = (value) => String(value).padStart(2, "0");

    return pad(hours) + ":" + pad(minutes) + ":" + pad(seconds);
  }
solutionExplanation: |
  The core insight: converting a flat count into mixed units is a chain of
  **divide for the big unit, take the remainder for what's left**. Division
  answers "how many whole hours fit?", and the remainder operator `%`
  answers "what's left over after taking them out?".

  Step by step, with `45296`:

  1. Hours: `Math.floor(45296 / 3600)` → `12`. (3600 seconds per hour;
     `Math.floor` because `/` gives a fraction otherwise.)
  2. Leftover after the hours: `45296 % 3600` → `2096` seconds.
  3. Minutes: `Math.floor(2096 / 60)` → `34`.
  4. Seconds: the remainder of the remainder — `45296 % 60` → `56`.

  Result: `12`, `34`, `56`. The most common slip is computing minutes from
  the *original* total (`Math.floor(45296 / 60)` is `754` — every minute in
  the whole duration), instead of from what's left after removing hours.

  The second trick is the formatting: `"HH:MM:SS"` needs every part to be
  two characters, so `1` must become `"01"`.
  `String(value).padStart(2, "0")` does precisely that — convert to string,
  then left-pad with zeros to width 2. Writing one small `pad` helper keeps
  you from repeating it three times.

  The `0` edge case checks both halves at once: all three parts come out as
  `0`, and without padding you'd return `"0:0:0"` instead of `"00:00:00"`.
  If your zero case fails, padding is almost always the culprit.

id: 0 # leave as 0 — a maintainer assigns the real id on acceptance
title: "Integer to Roman Numerals"
difficulty: hard
prompt: |
  Implement `intToRoman(n)` so it converts an integer between `1` and `3999`
  into a Roman numeral string.

  The basic symbols are `I`=1, `V`=5, `X`=10, `L`=50, `C`=100, `D`=500,
  `M`=1000. Symbols are written largest-first and added up — but to avoid
  four-in-a-row repeats, Roman numerals use six **subtractive pairs**:
  `IV`=4, `IX`=9, `XL`=40, `XC`=90, `CD`=400, `CM`=900.

  For example, `intToRoman(1994)` returns `"MCMXCIV"`:
  `1000 (M) + 900 (CM) + 90 (XC) + 4 (IV)`.
functionName: intToRoman
starterCode: |
  function intToRoman(n) {
    // your code here
  }
tests:
  - name: "1994 uses CM, XC and IV"
    args: [1994]
    expected: "MCMXCIV"
  - name: "58 is additive only"
    args: [58]
    expected: "LVIII"
  - name: "444 is subtractive at every level"
    args: [444]
    expected: "CDXLIV"
solution: |
  function intToRoman(n) {
    const table = [
      { value: 1000, symbol: "M" },
      { value: 900, symbol: "CM" },
      { value: 500, symbol: "D" },
      { value: 400, symbol: "CD" },
      { value: 100, symbol: "C" },
      { value: 90, symbol: "XC" },
      { value: 50, symbol: "L" },
      { value: 40, symbol: "XL" },
      { value: 10, symbol: "X" },
      { value: 9, symbol: "IX" },
      { value: 5, symbol: "V" },
      { value: 4, symbol: "IV" },
      { value: 1, symbol: "I" },
    ];

    let result = "";
    for (const { value, symbol } of table) {
      while (n >= value) {
        result += symbol;
        n -= value;
      }
    }
    return result;
  }
solutionExplanation: |
  The core insight: treat the subtractive pairs as **first-class entries in
  the value table**. If `CM` (900), `XL` (40) and friends sit in the table
  alongside `M` and `L`, then the whole conversion collapses to one greedy
  rule: *always take the largest value that still fits, as many times as it
  fits, then move on*.

  Build it up:

  1. List all 13 values — the 7 single symbols *and* the 6 subtractive
     pairs — sorted from largest to smallest. The sorting is what makes
     greedy work: by the time you reach a value, everything bigger has
     already been used up.
  2. Walk the table. For each entry, a small `while` loop appends the
     symbol and subtracts the value for as long as it still fits (`M` can
     repeat in 3000, hence `while` rather than `if`).
  3. When `n` hits `0`, the remaining table entries simply never fire.

  Trace `444`: `CD` fits once (444 → 44), `XL` fits once (44 → 4), `IV`
  fits once (4 → 0) → `"CDXLIV"`. Every digit took its subtractive form,
  and the algorithm never had to "know" that.

  Why greedy is *correct* here (it isn't for every problem!): each table
  value is more than the maximum that all smaller entries can legally
  express, so skipping the largest fitting value can never be repaired
  later. Roman numerals are designed for it.

  The dead-end you might have tried: building rules like "if a smaller
  symbol precedes a larger one, subtract…" — that's the *parsing*
  direction, and trying to generate output from those rules turns into a
  thicket of special cases for 4s and 9s. Folding the pairs into the data
  is the move that deletes all of that code: **put the special cases in
  the table, not in the logic**.

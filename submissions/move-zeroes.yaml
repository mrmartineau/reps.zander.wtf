id: 0 # leave as 0 — a maintainer assigns the real id on acceptance
title: "Move the Zeroes"
difficulty: medium
prompt: |
  Implement `moveZeroes(nums)` so it returns a **new** array with all the
  non-zero values first, in their original order, followed by all the zeroes.

  For example, `moveZeroes([0, 1, 0, 3, 12])` returns `[1, 3, 12, 0, 0]` —
  `1`, `3`, `12` keep their relative order, and the two zeroes sink to the
  end.

  An array with no zeroes comes back unchanged (as a new array).
functionName: moveZeroes
starterCode: |
  function moveZeroes(nums) {
    // your code here
  }
tests:
  - name: "Zeroes scattered through"
    args: [[0, 1, 0, 3, 12]]
    expected: [1, 3, 12, 0, 0]
  - name: "Zeroes already at the front"
    args: [[0, 0, 7, 0, 8, 9]]
    expected: [7, 8, 9, 0, 0, 0]
  - name: "No zeroes at all"
    args: [[1, 2, 3]]
    expected: [1, 2, 3]
solution: |
  function moveZeroes(nums) {
    const nonZero = nums.filter((n) => n !== 0);
    const zeroCount = nums.length - nonZero.length;
    return nonZero.concat(new Array(zeroCount).fill(0));
  }
solutionExplanation: |
  The core insight is that this is a **stable partition**: split the elements
  into two groups (non-zero and zero) while preserving order within each
  group, then glue the groups back together.

  That reframing makes the solution almost mechanical:

  1. `filter` out the non-zero values — `filter` visits left to right, so
     their original order is preserved for free.
  2. Count the zeroes. No need to collect them: every zero looks the same, so
     `nums.length - nonZero.length` is all you need.
  3. Append that many fresh zeroes with `new Array(count).fill(0)`.

  Trace `[0, 1, 0, 3, 12]`: filter gives `[1, 3, 12]`, the length difference
  is `5 - 3 = 2`, so append two zeroes → `[1, 3, 12, 0, 0]`.

  The tempting wrong turn is `sort`: there's no comparator that means "zeroes
  last but everyone else stays put" — sorting reorders the non-zero values
  too. Another classic trap is removing zeroes with `splice` while looping
  forward: deleting shifts every later index down, so adjacent zeroes get
  skipped (the second test's `0, 0` at the front catches this).

  The no-zeroes edge case falls out naturally: the filter keeps everything,
  the zero count is `0`, and you append nothing — but you still return a new
  array, as the prompt asks.

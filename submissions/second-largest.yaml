id: 0 # leave as 0 — a maintainer assigns the real id on acceptance
title: "Second Largest"
difficulty: medium
prompt: |
  Implement `secondLargest(nums)` so it returns the second-largest **distinct**
  value in the array. Duplicates of the maximum don't count: in `[5, 5, 4]` the
  largest value is `5`, so the second-largest distinct value is `4`.

  If there is no second distinct value — every element is the same, or the
  array has fewer than two elements — return `null`.

  For example, `secondLargest([3, 1, 4, 2])` returns `3`.
functionName: secondLargest
starterCode: |
  function secondLargest(nums) {
    // your code here
  }
tests:
  - name: "Distinct values"
    args: [[3, 1, 4, 2]]
    expected: 3
  - name: "Duplicate maximum"
    args: [[5, 5, 4]]
    expected: 4
  - name: "No second distinct value"
    args: [[7, 7, 7]]
    expected: null
solution: |
  function secondLargest(nums) {
    let largest = null;
    let second = null;
    for (const n of nums) {
      if (largest === null || n > largest) {
        second = largest;
        largest = n;
      } else if (n < largest && (second === null || n > second)) {
        second = n;
      }
    }
    return second;
  }
solutionExplanation: |
  The trick is to track **two** running values in a single pass: the largest
  seen so far, and the largest seen so far that is *strictly smaller* than it.

  Walk the array once. For each number there are three possibilities:

  1. It beats `largest` — the old champion gets demoted to `second`, and this
     number becomes the new `largest`.
  2. It ties `largest` — ignore it. This is the gotcha the `[5, 5, 4]` test
     guards: a duplicate of the maximum is *not* a second value, so it must
     never overwrite `second`. The `n < largest` check is what keeps it out.
  3. It's smaller than `largest` but bigger than the current `second` — it
     becomes the new `second`.

  Starting both trackers at `null` means "haven't seen one yet", and it also
  gives you the edge case for free: if no strictly-smaller value ever shows up
  (all elements equal, or a one-element array), `second` is still `null` at the
  end — exactly what the puzzle asks you to return.

  You might have tried `nums.sort()[nums.length - 2]` — but that breaks on
  duplicates (`[5, 5, 4]` would give `5`) and on ties. Deduplicating first
  (`[...new Set(nums)]`) fixes that, but the two-tracker scan is the classic
  O(n) approach and generalises to "k-th largest while streaming".

id: 0 # leave as 0 — a maintainer assigns the real id on acceptance
title: "Longest Streak"
difficulty: medium
prompt: |
  Implement `longestStreak(arr)` so it returns the length of the longest run
  of equal **consecutive** elements.

  For example, `longestStreak([1, 1, 2, 2, 2, 3])` returns `3` — the run of
  three `2`s is the longest. Equal values separated by something else don't
  join up into one streak.

  An empty array has no runs at all — return `0`.
functionName: longestStreak
starterCode: |
  function longestStreak(arr) {
    // your code here
  }
tests:
  - name: "Run of three in the middle"
    args: [[1, 1, 2, 2, 2, 3]]
    expected: 3
  - name: "Longest run at the end"
    args: [["a", "b", "b", "a", "a", "a", "a"]]
    expected: 4
  - name: "Empty array"
    args: [[]]
    expected: 0
solution: |
  function longestStreak(arr) {
    let best = 0;
    let current = 0;
    for (let i = 0; i < arr.length; i++) {
      if (i > 0 && arr[i] === arr[i - 1]) {
        current += 1;
      } else {
        current = 1;
      }
      if (current > best) {
        best = current;
      }
    }
    return best;
  }
solutionExplanation: |
  This is the **current/best counter** pattern, and it shows up everywhere
  (longest streak, max consecutive wins, run-length encoding). Keep two
  numbers while scanning: `current` — how long the run you're standing in has
  been — and `best` — the longest run finished so far.

  The update rule is the whole algorithm: if this element equals the previous
  one, the run continues, so `current += 1`; otherwise a new run starts, so
  `current = 1`. After every step, fold `current` into `best` with
  `best = Math.max(best, current)`.

  Two gotchas worth naming:

  - **Update `best` on every element, not only when a run breaks.** If you
    only record a streak when it *ends*, the longest run loses when it's the
    final one — the `["a", "b", "b", "a", "a", "a", "a"]` test ends mid-streak
    on purpose to catch exactly that.
  - **The empty array.** Starting `best` at `0` (not `1`) means a loop that
    never runs returns `0` for free. Initialising `best = 1` "because any
    element is a run of one" is fine for non-empty input but wrong for `[]`.

  Quick trace of the second test: `current` goes 1, 1, 2, 1, 2, 3, 4 as you
  walk it, and `best` ratchets up to `4` on the last element — which is the
  answer even though that run never "ended".

id: 0 # leave as 0 — a maintainer assigns the real id on acceptance
title: "Diagonal Sum"
difficulty: easy
prompt: |
  Implement `diagonalSum(matrix)` so it returns the sum of the **main
  diagonal** of a square matrix — the values running from the top-left corner
  to the bottom-right corner.

  For example:

  ```js
  diagonalSum([
    [1, 2],
    [3, 4],
  ]);
  // → 5  (1 + 4)
  ```
functionName: diagonalSum
starterCode: |
  function diagonalSum(matrix) {
    // your code here
  }
tests:
  - name: "2x2 matrix"
    args: [[[1, 2], [3, 4]]]
    expected: 5
  - name: "3x3 matrix"
    args: [[[1, 2, 3], [4, 5, 6], [7, 8, 9]]]
    expected: 15
  - name: "1x1 matrix"
    args: [[[7]]]
    expected: 7
solution: |
  function diagonalSum(matrix) {
    let sum = 0;
    for (let i = 0; i < matrix.length; i++) {
      sum += matrix[i][i];
    }
    return sum;
  }
solutionExplanation: |
  The core insight: on the main diagonal, the row index and the column index
  are always **equal**. Top-left is `matrix[0][0]`, the next one down-right is
  `matrix[1][1]`, then `matrix[2][2]`, and so on. So the whole puzzle reduces
  to summing `matrix[i][i]` for every `i`.

  That means you only need **one** loop, not two. A natural first instinct is
  a nested loop over every cell with an `if (row === col)` check — it works,
  but it visits n² cells to pick out the n you care about. Indexing
  `matrix[i][i]` directly goes straight to them.

  Trace the 3×3 case: `matrix[0][0] = 1`, `matrix[1][1] = 5`,
  `matrix[2][2] = 9` → `1 + 5 + 9 = 15`.

  The 1×1 edge case checks that your loop bounds come from the matrix itself
  (`matrix.length`), not a hardcoded size: a single cell `[[7]]` is its own
  entire diagonal, so the answer is just `7`. This works because the matrix is
  guaranteed square — row count equals column count, so `matrix[i][i]` always
  exists.
